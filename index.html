              <p className="text-gray-500 text-xs">{item.deviceModel || 'Device'}</p>
            </div>
            <span className="text-emerald-400">✓</span>
          </div>
        ))}
      </div>
      <Btn onClick={onAnother}>Onboard More Devices →</Btn>
    </div>
  );
};

// ── APP ────────────────────────────────────────────────────────────────────────
const STEPS = ['scan','tags','location','contact','adding_gl','device_type','subscription','application','site','function','review'];
// device_type is a fallback screen — give it the same progress value as subscription so the bar doesn't jump.
const STEP_PROGRESS = { scan:0, tags:1, location:2, contact:3, adding_gl:4, device_found:0, device_status:0, device_type:5, subscription:5, application:6, site:7, function:8, hostname:9, review:10 };
const TOTAL_STEPS = 10;

const defaultSettings = () => ({
  glClientId: '', glClientSecret: '', workspaceId: '',
  centralCluster: 'eu1',
  demoMode: false,
  scanConfirm: true,
  batchMode: false,
});

const App = () => {
  const [screen, setScreen] = useState('boot');
  const [settings, setSettings] = useState(() => {
    try { return { ...defaultSettings(), ...JSON.parse(localStorage.getItem('aruba_cfg2') || '{}') }; }
    catch { return defaultSettings(); }
  });
  const [summary, setSummary] = useState({});
  const [tokenError, setTokenError] = useState(null);
  // Batch mode state
  const [batchQueue, setBatchQueue]       = useState([]);
  const [batchGroups, setBatchGroups]     = useState([]);
  const [batchGroupIdx, setBatchGroupIdx] = useState(0);
  const [batchShared, setBatchShared]     = useState({});
  const glTokenRef = useRef({ token: null, expiry: 0 });

  const upd = patch => setSummary(p => ({ ...p, ...patch }));

  // Resolve which API set to use
  const api = settings.demoMode ? demoApi : liveApi;

  const getGlToken = useCallback(async () => {
    if (settings.demoMode) return 'demo';
    const now = Date.now();
    if (glTokenRef.current.token && glTokenRef.current.expiry > now) return glTokenRef.current.token;
    // Unified mode: workspace-scoped GL endpoint + Basic Auth (per pycentral v2 SDK)
    const wsId = settings.workspaceId?.trim();
    const url  = wsId ? unifiedTokenUrl(wsId) : TOKEN_URL;
    const { token, expiresAt } = await fetchToken(settings.glClientId, settings.glClientSecret, 'GreenLake', url, !!wsId);
    glTokenRef.current = { token, expiry: expiresAt };
    return token;
  }, [settings.demoMode, settings.glClientId, settings.glClientSecret, settings.workspaceId]);

  useEffect(() => {
    const hasGlCreds = settings.glClientId && settings.glClientSecret;
    const hasConfig  = settings.demoMode || (hasGlCreds && settings.workspaceId?.trim());
    if (hasConfig) {
      // Pre-fetch token on startup so errors surface immediately on the scan screen
      setScreen('scan');
      if (!settings.demoMode && hasGlCreds) {
        const centralUrl = CLUSTERS.find(c => c.id === settings.centralCluster)?.url || CLUSTERS[0].url;
        getGlToken()
          .then(token => {
            setTokenError(null);
            setLiveSettings(s => ({ ...s, token, centralToken: token, centralUrl }));
          })
          .catch(e => {
            console.error('Startup token fetch failed:', e);
            setTokenError(e.message);
          });
      }
    } else {
      const welcomed = localStorage.getItem('aruba_welcomed');
      setScreen(welcomed ? 'settings' : 'welcome');
    }
  }, []);

  // Scroll to top on every screen change so sticky header never covers content
  useEffect(() => { window.scrollTo(0, 0); }, [screen]);

  // Validate GL credentials by fetching a token then making one lightweight API call.
  // Returns { ok: true } or { ok: false, reason: string }
  const validateCredentials = useCallback(async (clientId, clientSecret, workspaceId) => {
    try {
      const wsId = workspaceId?.trim();
      const url  = wsId ? unifiedTokenUrl(wsId) : TOKEN_URL;
      const { token } = await fetchToken(clientId, clientSecret, 'Validation', url, !!wsId);
      // Token OK — now confirm the workspace ID works with a cheap device list call
      const res = await proxyCall({ url: `${GL_BASE}/devices/v1/devices?limit=1`, token });
      if (res.ok || res.status === 404) return { ok: true };
      const body = await res.text();
      return { ok: false, reason: parseApiError(body) || `API returned ${res.status}` };
    } catch (e) {
      return { ok: false, reason: parseApiError(e.message) || e.message };
    }
  }, []);

  const saveSettings = s => {
    const toStore = {
      glClientId: s.glClientId, glClientSecret: s.glClientSecret, workspaceId: s.workspaceId,
      centralCluster: s.centralCluster, demoMode: s.demoMode, scanConfirm: s.scanConfirm, batchMode: s.batchMode,
    };
    localStorage.setItem('aruba_cfg2', JSON.stringify(toStore));
    glTokenRef.current = { token: null, expiry: 0 };
    setSettings(s);
    // Sync liveSettings immediately so display-only fields (demoMode, scanConfirm, etc.)
    // update right away without waiting for the next token fetch.
    setLiveSettings(prev => ({ ...prev, ...toStore }));
    setScreen('scan');
  };

  const isBatch = screen.startsWith('batch_');
  // Don't show progress bar on batch-mode scan home screen — it's the entry point, not step 1
  const showProgress = !isBatch && !(settings.batchMode && screen === 'scan') && !['settings','success','boot','device_found','device_status'].includes(screen);
  const currentStep = STEP_PROGRESS[screen] ?? 0;
  const backTarget = isBatch ? null : ({
    tags:          'scan',
    location:      'tags',
    contact:       'location',
    device_status: 'device_found',
    application:   'subscription',
    site:          'application',
    function:      'site',
    review:        summary.deviceType === 'UXI' ? 'application' : 'function',
    settings:      'scan',
  }[screen] ?? null);

  // Batch back navigation — some are dynamic (group cycling), handled in components
  const batchBack = () => {
    switch(screen) {
      case 'batch_scan':         setScreen('scan'); break;
      case 'batch_tags':         setScreen('batch_scan'); break;
      case 'batch_location':     setScreen('batch_tags'); break;
      case 'batch_contact':      setScreen('batch_location'); break;
      case 'batch_subscription':
        if (batchGroupIdx > 0) { setBatchGroupIdx(i => i - 1); setScreen('batch_function'); }
        else setScreen('batch_adding_gl');
        break;
      case 'batch_function':     setScreen('batch_subscription'); break;
      case 'batch_application':  setScreen(batchGroups.length > 0 ? 'batch_function' : 'batch_adding_gl'); break;
      case 'batch_site':         setScreen('batch_application'); break;
      case 'batch_hostname':     setScreen('batch_site'); break;
      case 'batch_review':       setScreen('batch_hostname'); break;
      default: break;
    }
  };
  const showBatchBack = isBatch && !['batch_adding_gl','batch_provisioning','batch_success'].includes(screen);

  const [liveSettings, setLiveSettings] = useState(settings);
  const enterScreen = useCallback(async (next) => {
    const centralUrl = CLUSTERS.find(c => c.id === settings.centralCluster)?.url || CLUSTERS[0].url;
    if (!settings.demoMode && settings.glClientId) {
      try {
        const token = await getGlToken();
        setTokenError(null);
        setLiveSettings({ ...settings, token, centralToken: token, centralUrl });
      } catch(e) {
        console.error('Token refresh failed:', e);
        setTokenError(e.message);
        setLiveSettings({ ...settings, centralUrl });
      }
    } else {
      setLiveSettings({ ...settings, centralUrl });
    }
    setScreen(next);
  }, [settings, getGlToken]);

  return (
    <div className="min-h-screen" style={{ background: '#111827', maxWidth: 480, margin: '0 auto' }}>
      {/* Header */}
      {screen !== 'welcome' && <div className="sticky top-0 z-20 pt-safe" style={{ background: '#111827' }}>
        <div className="flex items-center gap-3 px-5 pt-12 pb-3">
          <button
            onClick={(backTarget || showBatchBack) ? (isBatch ? batchBack : () => setScreen(backTarget)) : undefined}
            className={`p-1.5 rounded-lg shrink-0 transition-all duration-200 ${(backTarget || showBatchBack) ? 'text-gray-400 hover:text-white hover:bg-white hover:bg-opacity-10 opacity-100' : 'opacity-0 pointer-events-none'}`}
            title="Go back"
          >
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
              <polyline points="15 18 9 12 15 6"/>
            </svg>
          </button>
          <span className="text-2xl leading-none shrink-0">🌐</span>
          <div>
            <h1 className="text-white font-bold text-[15px] leading-tight">Networking - Device Onboarder</h1>
            <p className="text-gray-500 text-xs">GreenLake + Aruba Central Provisioning</p>
          </div>
          <div className="ml-auto flex items-center gap-2">
            {settings.batchMode && (
              <span className="text-xs bg-purple-500 bg-opacity-20 text-purple-400 px-2.5 py-1 rounded-full font-semibold whitespace-nowrap">⚡ Batch Scan</span>
            )}
            {settings.demoMode && (
              <span className="text-xs bg-yellow-500 bg-opacity-20 text-yellow-400 px-2.5 py-1 rounded-full font-semibold">Demo</span>
            )}
            {showProgress && (
              <button
                onClick={() => { setSummary({}); setScreen('scan'); }}
                className="text-gray-400 hover:text-white transition-colors p-1.5 rounded-lg hover:bg-white hover:bg-opacity-10"
                title="Start over"
              >
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                  <polyline points="9 22 9 12 15 12 15 22"/>
                </svg>
              </button>
            )}
          </div>
        </div>
        {showProgress && <ProgressSteps step={currentStep} total={TOTAL_STEPS} />}
        {summary.deviceType && !isBatch && !['scan','tags','location','contact','adding_gl','settings','success','boot'].includes(screen) && (
          <DeviceChip deviceType={summary.deviceType} model={summary.deviceModel} partNumber={summary.devicePartNumber} serial={summary.serial} />
        )}
        {isBatch && ['batch_subscription','batch_function'].includes(screen) && batchGroups[batchGroupIdx] && (
          <BatchGroupBanner group={batchGroups[batchGroupIdx]} groupIdx={batchGroupIdx} totalGroups={batchGroups.length} />
        )}
      </div>}

      {/* Screens */}
      <div className="pb-16">
        {screen === 'boot' && <div className="flex justify-center pt-20"><Spinner size={44} /></div>}

        {screen === 'welcome' && (
          <WelcomeScreen onDismiss={() => {
            localStorage.setItem('aruba_welcomed', '1');
            setScreen('settings');
          }} />
        )}

        {screen === 'settings' && (
          <SettingsScreen settings={settings} onSave={saveSettings}
            onValidate={validateCredentials}
            onBack={summary.serial ? () => setScreen('scan') : null} />
        )}

        {screen === 'scan' && settings.batchMode && (
          <BatchScanScreen settings={liveSettings} api={api}
            onBack={null}
            onOpenSettings={() => setScreen('settings')}
            onDone={queue => {
              setBatchQueue(queue);
              setBatchShared({});
              enterScreen('batch_tags');
            }} />
        )}

        {screen === 'scan' && !settings.batchMode && (
          <>
            {tokenError && (
              <div className="mx-5 mb-3 p-3 rounded-xl bg-red-900/40 border border-red-500/40">
                <p className="text-red-400 text-xs font-semibold mb-1">⚠️ Authentication Error</p>
                <p className="text-red-300 text-xs leading-relaxed">{tokenError}</p>
                <button className="mt-2 text-red-400 underline text-xs" onClick={() => setTokenError(null)}>Dismiss</button>
              </div>
            )}
            <ScanScreen settings={liveSettings}
              onScanned={(d, raw) => {
                upd({ ...d, rawBarcode: raw, currentTags: {}, currentContactId: null, currentLocationId: null, currentSubscriptionKey: null, currentApplicationId: null, currentSiteId: null, currentFunctionId: null });
                // Background lookups — fetch a fresh token first so lookups don't fail
                // if liveSettings.token is stale at the moment the scan fires.
                getGlToken()
                  .then(token => {
                    const centralUrl = CLUSTERS.find(c => c.id === liveSettings.centralCluster)?.url || CLUSTERS[0].url;
                    // Fire GL and Central lookups in parallel
                    return Promise.all([
                      api.glLookupDevice({ serial: d.serial, ...liveSettings, token }),
                      api.centralGetDeviceSiteId({ serial: d.serial, centralToken: token, centralUrl }),
                    ]);
                  })
                  .then(([existing, centralInfo]) => {
                    const { siteId, persona } = centralInfo || {};
                    console.log('[background lookup] existing:', !!existing, '| siteId:', siteId, '| persona:', persona);
                    if (existing) {
                      const patch = {
                        currentTags:            existing.tags || {},
                        // contact.workspaceUser.id for WORKSPACE-USER type; contact.id as fallback
                        currentContactId:       existing.contact?.workspaceUser?.id || existing.contact?.id || null,
                        currentLocationId:      existing.location?.id || null,
                        // subscription is an array in the API response — use the normalised _subKey
                        currentSubscriptionKey: existing._subKey || null,
                        currentApplicationId:   existing.application?.id  || null,
                      };
                      console.log('[background lookup] upd patch:', JSON.stringify(patch));
                      upd(patch);
                    }
                    // Persona 'None' means no function is configured — treat as null
                    const fnId = (persona && persona !== 'None') ? persona : null;
                    if (siteId || fnId) upd({
                      ...(siteId ? { currentSiteId:     siteId } : {}),
                      ...(fnId   ? { currentFunctionId: fnId   } : {}),
                    });
                  })
                  .catch(e => console.warn('[background lookup] failed:', e.message));
                enterScreen('tags');
              }}
              onOpenSettings={() => setScreen('settings')} />
          </>
        )}

        {screen === 'tags' && (
          <TagsScreen settings={liveSettings} api={api}
            initialTags={
              Object.keys(summary.currentTags || {}).length > 0
                ? summary.currentTags
                : (() => { try { return JSON.parse(localStorage.getItem('aruba_last_tags')); } catch(e) { return null; } })()
            }
            onNext={tags => {
              if (Object.keys(tags).length > 0) localStorage.setItem('aruba_last_tags', JSON.stringify(tags));
              upd({ tags }); enterScreen('location');
            }} />
        )}

        {screen === 'location' && (
          <LocationScreen settings={liveSettings} api={api}
            initialId={summary.currentLocationId || localStorage.getItem('aruba_last_location')}
            onNext={loc => {
              if (loc?.id) localStorage.setItem('aruba_last_location', String(loc.id));
              upd({ location: loc }); enterScreen('contact');
            }} />
        )}

        {screen === 'contact' && (
          <ContactScreen settings={liveSettings} api={api}
            initialId={summary.currentContactId || localStorage.getItem('aruba_last_contact')}
            onSelect={contact => {
              if (contact?.id) localStorage.setItem('aruba_last_contact', String(contact.id));
              upd({ contact }); enterScreen('adding_gl');
            }}
            onSkip={() => { upd({ contact: null }); enterScreen('adding_gl'); }} />
        )}

        {screen === 'adding_gl' && (
          <AddingScreen device={summary} settings={liveSettings} api={api}
            onSuccess={device => {
              const glType = (device.deviceType || '').toUpperCase();
              const mapped = GL_DEVICE_TYPE_MAP[glType] || null;
              console.log('[auto-detect] GL deviceType:', glType, '→ app type:', mapped);
              upd({
                deviceId: device.id,
                deviceType: mapped,
                deviceModel: device.model || device.deviceModel || null,
                devicePartNumber: device.partNumber || null,
                foundExisting: device.foundExisting || false,
                // Only overwrite current* values if the device response actually contains them —
                // the background lookup (glLookupDevice) may have already set these and we
                // don't want to clobber them with null if the v1 response omits the fields.
                ...(device._subKey           ? { currentSubscriptionKey: device._subKey           } : {}),
                ...(device.application?.id   ? { currentApplicationId:   device.application.id    } : {}),
              });
              console.log('[onSuccess] _subKey:', device._subKey, '| application?.id:', device.application?.id);
              // Existing devices get the choice screen first; new devices go straight to provisioning
              if (device.foundExisting) {
                enterScreen('device_found');
              } else {
                enterScreen(mapped ? 'subscription' : 'device_type');
              }
            }}
            onBack={() => setScreen('location')} />
        )}

        {screen === 'device_found' && (
          <DeviceFoundScreen summary={summary}
            onViewStatus={() => setScreen('device_status')}
            onProvision={() => enterScreen(summary.deviceType ? 'subscription' : 'device_type')}
            onBack={() => { setSummary({}); setScreen('scan'); }} />
        )}

        {screen === 'device_status' && (
          <DeviceStatusScreen summary={summary} settings={liveSettings} api={api}
            onProvision={() => enterScreen(summary.deviceType ? 'subscription' : 'device_type')}
            onBack={() => setScreen('device_found')} />
        )}

        {screen === 'device_type' && (
          <DeviceTypeScreen device={summary}
            onSelect={type => { upd({ deviceType: type }); enterScreen('subscription'); }} />
        )}

        {screen === 'subscription' && (
          <SubscriptionScreen settings={liveSettings} api={api} deviceType={summary.deviceType}
            initialKey={summary.currentSubscriptionKey || localStorage.getItem('aruba_last_sub')}
            onSelect={sub => {
              localStorage.setItem('aruba_last_sub', sub.key);
              upd({ subscription: sub }); enterScreen('application');
            }}
            onSkip={() => { upd({ subscription: null }); enterScreen('application'); }} />
        )}

        {screen === 'application' && (
          <ApplicationScreen settings={liveSettings} api={api} deviceType={summary.deviceType}
            initialId={summary.currentApplicationId || null}
            onSelect={(app) => { upd({ application: app, applicationRegion: app.region }); enterScreen(summary.deviceType === 'UXI' ? 'review' : 'site'); }} />
        )}

        {screen === 'site' && (
          <SiteScreen settings={liveSettings} api={api}
            initialId={summary.currentSiteId || localStorage.getItem('aruba_last_site')}
            onSelect={site => {
              localStorage.setItem('aruba_last_site', String(site.id));
              upd({ site }); enterScreen('function');
            }}
            onSkip={() => { upd({ site: null }); enterScreen('function'); }} />
        )}

        {screen === 'function' && (
          <FunctionScreen deviceType={summary.deviceType}
            initialId={summary.currentFunctionId || localStorage.getItem('aruba_last_function')}
            onSelect={fn => {
              localStorage.setItem('aruba_last_function', fn.id);
              upd({ deviceFunction: fn }); setScreen('hostname');
            }}
            onSkip={() => { upd({ deviceFunction: null }); setScreen('hostname'); }} />
        )}

        {screen === 'hostname' && (
          <HostnameScreen settings={liveSettings} api={api}
            deviceType={summary.deviceType}
            serial={summary.serial}
            onNext={({ hostname, hostnameExists, scopeId, persona }) => { upd({ hostname, hostnameExists, hostnameScopeId: scopeId || null, hostnamePersona: persona || 'CAMPUS_AP' }); setScreen('review'); }}
            onSkip={() => { upd({ hostname: null, hostnameExists: false, hostnameScopeId: null }); setScreen('review'); }} />
        )}

        {screen === 'review' && (
          <ReviewScreen summary={summary} settings={liveSettings} api={api}
            onDone={() => setScreen('success')}
            onBack={() => setScreen(summary.deviceType === 'UXI' ? 'application' : 'hostname')} />
        )}

        {screen === 'success' && (
          <SuccessScreen summary={summary}
            onAnother={() => { setSummary({}); enterScreen('scan'); }} />
        )}

        {/* ── BATCH SCREENS ───────────────────────────── */}

        {screen === 'batch_scan' && (
          <BatchScanScreen settings={liveSettings} api={api}
            onBack={() => setScreen('scan')}
            onOpenSettings={() => setScreen('settings')}
            onDone={queue => {
              setBatchQueue(queue);
              setBatchShared({});
              enterScreen('batch_tags');
            }} />
        )}

        {screen === 'batch_tags' && (
          <TagsScreen settings={liveSettings} api={api}
            initialTags={
              Object.keys(batchShared.currentTags || {}).length > 0
                ? batchShared.currentTags
                : (() => { try { return JSON.parse(localStorage.getItem('aruba_last_tags')); } catch(e) { return null; } })()
            }
            onNext={tags => {
              if (Object.keys(tags).length > 0) localStorage.setItem('aruba_last_tags', JSON.stringify(tags));
              setBatchShared(s => ({ ...s, tags }));
              enterScreen('batch_location');
            }} />
        )}

        {screen === 'batch_location' && (
          <LocationScreen settings={liveSettings} api={api}
            initialId={localStorage.getItem('aruba_last_location')}
            onNext={loc => {
              if (loc?.id) localStorage.setItem('aruba_last_location', String(loc.id));
              setBatchShared(s => ({ ...s, location: loc }));
              enterScreen('batch_contact');
            }} />
        )}

        {screen === 'batch_contact' && (
          <ContactScreen settings={liveSettings} api={api}
            initialId={localStorage.getItem('aruba_last_contact')}
            onSelect={contact => {
              if (contact?.id) localStorage.setItem('aruba_last_contact', String(contact.id));
              setBatchShared(s => ({ ...s, contact }));
              enterScreen('batch_adding_gl');
            }}
            onSkip={() => { setBatchShared(s => ({ ...s, contact: null })); enterScreen('batch_adding_gl'); }} />
        )}

        {screen === 'batch_adding_gl' && (
          <BatchAddingScreen
            queue={batchQueue}
            shared={batchShared}
            settings={liveSettings} api={api}
            onBack={() => setScreen('batch_contact')}
            onSuccess={results => {
              setBatchQueue(results);
              const groups = computeBatchGroups(results);
              setBatchGroups(groups);
              setBatchGroupIdx(0);
              // If no successful devices, stay and show error
              if (results.filter(r => r.status === 'success').length === 0) return;
              if (groups.length > 0) {
                enterScreen('batch_subscription');
              } else {
                enterScreen('batch_application');
              }
            }} />
        )}

        {screen === 'batch_subscription' && batchGroups[batchGroupIdx] && (
          <SubscriptionScreen settings={liveSettings} api={api}
            deviceType={batchGroups[batchGroupIdx].deviceType}
            initialKey={batchGroups[batchGroupIdx].currentSubscriptionKey || localStorage.getItem('aruba_last_sub')}
            onSelect={sub => {
              if (sub?.key) localStorage.setItem('aruba_last_sub', sub.key);
              setBatchGroups(prev => prev.map((g, i) => i === batchGroupIdx ? { ...g, subscription: sub } : g));
              enterScreen('batch_function');
            }}
            onSkip={() => {
              setBatchGroups(prev => prev.map((g, i) => i === batchGroupIdx ? { ...g, subscription: null } : g));
              enterScreen('batch_function');
            }} />
        )}

        {screen === 'batch_function' && batchGroups[batchGroupIdx] && (
          <FunctionScreen
            deviceType={batchGroups[batchGroupIdx].deviceType}
            initialId={batchGroups[batchGroupIdx].currentFunctionId || localStorage.getItem('aruba_last_function')}
            onSelect={fn => {
              if (fn?.id) localStorage.setItem('aruba_last_function', fn.id);
              setBatchGroups(prev => prev.map((g, i) => i === batchGroupIdx ? { ...g, deviceFunction: fn } : g));
              if (batchGroupIdx < batchGroups.length - 1) {
                setBatchGroupIdx(i => i + 1);
                enterScreen('batch_subscription');
              } else {
                enterScreen('batch_application');
              }
            }}
            onSkip={() => {
              setBatchGroups(prev => prev.map((g, i) => i === batchGroupIdx ? { ...g, deviceFunction: null } : g));
              if (batchGroupIdx < batchGroups.length - 1) {
                setBatchGroupIdx(i => i + 1);
                enterScreen('batch_subscription');
              } else {
                enterScreen('batch_application');
              }
            }} />
        )}

        {screen === 'batch_application' && (
          <ApplicationScreen settings={liveSettings} api={api}
            deviceType={batchGroups[0]?.deviceType || null}
            initialId={null}
            onSelect={app => {
              setBatchShared(s => ({ ...s, application: app, applicationRegion: app.region }));
              enterScreen('batch_site');
            }} />
        )}

        {screen === 'batch_site' && (
          <SiteScreen settings={liveSettings} api={api}
            initialId={localStorage.getItem('aruba_last_site')}
            onSelect={site => {
              localStorage.setItem('aruba_last_site', String(site.id));
              setBatchShared(s => ({ ...s, site }));
              enterScreen('batch_hostname');
            }}
            onSkip={() => { setBatchShared(s => ({ ...s, site: null })); enterScreen('batch_hostname'); }} />
        )}

        {screen === 'batch_hostname' && (
          <BatchHostnameScreen
            queue={batchQueue}
            onNext={({ hostnames, hostnamePattern }) => {
              setBatchShared(s => ({ ...s, hostnames, hostnamePattern }));
              enterScreen('batch_review');
            }}
            onSkip={() => {
              setBatchShared(s => ({ ...s, hostnames: null, hostnamePattern: null }));
              enterScreen('batch_review');
            }} />
        )}

        {screen === 'batch_review' && (
          <BatchReviewScreen
            queue={batchQueue}
            groups={batchGroups}
            shared={batchShared}
            onBack={() => setScreen('batch_hostname')}
            onProvision={() => enterScreen('batch_provisioning')} />
        )}

        {screen === 'batch_provisioning' && (
          <BatchProvisionScreen
            queue={batchQueue}
            groups={batchGroups}
            shared={batchShared}
            settings={liveSettings} api={api}
            onDone={() => setScreen('batch_success')} />
        )}

        {screen === 'batch_success' && (
          <BatchSuccessScreen
            queue={batchQueue}
            onAnother={() => { setBatchQueue([]); setBatchGroups([]); setBatchShared({}); setBatchGroupIdx(0); enterScreen('scan'); }} />
        )}
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
