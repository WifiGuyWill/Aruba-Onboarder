// Subscription filtering: include/exclude keyword sets per device type.
// Matching is case-insensitive on skuDescription.
// Filter on subscriptionType (primary) with tier as fallback.
// subscriptionType observed in API: CENTRAL_AP, CENTRAL_GW, CENTRAL_BRIDGE,
//   UXI_SENSOR_CLOUD, UXI_SENSOR_LTE, CENTRAL_SWITCH* (exact value TBC).
// tier observed: ADVANCED_AP, ADVANCE_70XX, FOUNDATION_BRIDGE, FOUNDATION_SENSOR_*,
//   FOUNDATION_SWITCH_CX_CL1/2/3/4, etc.
// Subscription filtering: include/exclude keyword sets per device type.
// Matching checks (in order): subscriptionType prefix, tier field, skuDescription keyword.
// The real GreenLake API may use types like FOUNDATION_SWITCH_CX_CL1 (not CENTRAL_SWITCH*),
// so skuContains acts as a reliable final fallback.
const SUBSCRIPTION_RULES = {
  AP:      { typePrefixes: ['CENTRAL_AP'],     tierContains: '_AP',     skuContains: 'central ap' },
  GATEWAY: { typePrefixes: ['CENTRAL_GW'],     tierContains: '_GW',     skuContains: 'gateway' },
  SWITCH:  { typePrefixes: ['CENTRAL_SWITCH'], tierContains: 'SWITCH',  skuContains: 'switch' },
  BRIDGE:  { typePrefixes: ['CENTRAL_BRIDGE'], tierContains: 'BRIDGE',  skuContains: 'bridge' },
  UXI:     { typePrefixes: ['UXI_'],           tierContains: 'SENSOR',  skuContains: 'uxi' },
  EP:      null, // show all
};

function filterSubscriptions(subs, deviceType) {
  const rule = SUBSCRIPTION_RULES[deviceType];
  if (!rule) return subs;
  const filtered = subs.filter(sub => {
    const type = (sub.subscriptionType || '').toUpperCase();
    const tier = (sub.tier || '').toUpperCase();
    const sku  = (sub.skuDescription || '').toLowerCase();
    return rule.typePrefixes.some(p => type.startsWith(p))
        || tier.includes(rule.tierContains)
        || sku.includes(rule.skuContains);
  });
  // Sort: Advanced tier first, then by available quantity descending.
  return filtered.sort((a, b) => {
    const aAdv = (a.tier || '').toUpperCase().includes('ADVAN');
    const bAdv = (b.tier || '').toUpperCase().includes('ADVAN');
    if (aAdv !== bAdv) return aAdv ? -1 : 1;
    return Number(b.availableQuantity || 0) - Number(a.availableQuantity || 0);
  });
}

// Human-readable labels and icons for each device type shown in the DeviceChip
const DEVICE_TYPE_META = {

const GL_BASE = 'https://global.api.greenlake.hpe.com';
// Standard HPE SSO token endpoint (used for standalone GL or Central credentials)
const TOKEN_URL = 'https://sso.common.cloud.hpe.com/as/token.oauth2';
// Unified token endpoint — one token works for both GreenLake AND New Central.
// Requires workspace_id embedded in the path.  Discovered via aruba/pycentral v2 SDK.
const unifiedTokenUrl = workspaceId =>
  `https://global.api.greenlake.hpe.com/authorization/v2/oauth2/${workspaceId}/token`;
const delay = ms => new Promise(r => setTimeout(r, ms));

// ── PROXY CALL ─────────────────────────────────────────────────────────────────
// All API traffic goes through /proxy to avoid CORS
async function proxyCall({ url, method = 'GET', token, body, contentType = 'application/json', extraHeaders = {} }) {
  const headers = { ...extraHeaders };
  if (token) headers['Authorization'] = `Bearer ${token}`;
  if (body) headers['Content-Type'] = contentType;

  const res = await fetch('/proxy', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      url,
      method,
      headers,
      body: body ? (typeof body === 'string' ? body : JSON.stringify(body)) : undefined,
    }),
  });
  return res;
}

// ── TOKEN MANAGER ──────────────────────────────────────────────────────────────
// useBasicAuth=true: credentials go in Authorization: Basic header (required by the
// unified GL endpoint, per aruba/pycentral v2 SDK which uses HTTPBasicAuth).
// useBasicAuth=false (default): credentials in POST body (standard HPE SSO endpoint).
async function fetchToken(clientId, clientSecret, label = '', tokenUrl = TOKEN_URL, useBasicAuth = false) {
  let body, extraHeaders = {};
  if (useBasicAuth) {
    // Basic Auth: credentials in Authorization header per OAuth2 RFC 6749 §2.3.1
    // Also include client_id in body — some servers require both (belt-and-suspenders)
    extraHeaders['Authorization'] = `Basic ${btoa(`${clientId}:${clientSecret}`)}`;
    body = `grant_type=client_credentials&client_id=${encodeURIComponent(clientId)}`;
  } else {
    body = `grant_type=client_credentials&client_id=${encodeURIComponent(clientId)}&client_secret=${encodeURIComponent(clientSecret)}`;
  }
  console.log(`[fetchToken] ${label || 'Token'} | url: ${tokenUrl} | basicAuth: ${useBasicAuth} | clientId: ${clientId?.substring(0,8)}…`);
  const res = await proxyCall({
    url: tokenUrl, method: 'POST',
    contentType: 'application/x-www-form-urlencoded',
    body, extraHeaders,
  });
  if (!res.ok) {
    const txt = await res.text();
    console.error(`[fetchToken] ${label} FAILED ${res.status}:`, txt);
    // Provide actionable hint for the common "unauthorized_request" error
    const isUnauthorizedReq = txt.includes('unauthorized_request');
    const hint = isUnauthorizedReq
      ? ' — Check: (1) Workspace ID matches your GreenLake tenant URL, (2) API credentials were created at the platform/workspace level (not application-scoped)'
      : '';
    throw new Error(`${label ? label + ' t' : 'T'}oken error ${res.status}: ${txt}${hint}`);
  }
  const d = await res.json();
  console.log(`[fetchToken] ${label} OK — expires in ${d.expires_in}s`);
  return { token: d.access_token, expiresAt: Date.now() + (d.expires_in - 60) * 1000 };
}

// ── ASYNC POLLER ───────────────────────────────────────────────────────────────
async function pollAsync(operationUrl, token, maxAttempts = 30) {
  for (let i = 0; i < maxAttempts; i++) {
    await delay(2000);
    const res = await proxyCall({ url: operationUrl, token });
    if (!res.ok) throw new Error(`Poll error ${res.status}: ${await res.text()}`);
    const d = await res.json();
    console.log('[pollAsync]', operationUrl, JSON.stringify(d));
    const status = (d.status || d.state || '').toUpperCase();
    if (status === 'SUCCEEDED' || status === 'SUCCESS' || status === 'COMPLETED') return d;
    if (status === 'FAILED' || status === 'ERROR') {
      // Extract the most useful message from the async result payload
      let msg = d.message || d.errorMessage || d.error;
      if (!msg && Array.isArray(d.result?.failedDevices) && d.result.failedDevices.length) {
        const fd = d.result.failedDevices[0];
        msg = (fd.messages || []).join('; ') || fd.errorCode;
      }
      if (!msg && Array.isArray(d.result?.failedDevicesSerial) && d.result.failedDevicesSerial.length) {
        msg = `Device already exists or could not be added: ${d.result.failedDevicesSerial.join(', ')}`;
      }
      if (!msg) msg = JSON.stringify(d.result || d);
      const err = new Error(msg);
      err.errorCode = d.result?.failedDevices?.[0]?.errorCode || '';
      throw err;
    }
    // RUNNING / IN_PROGRESS → keep polling
  }
  throw new Error('Operation timed out');
}

// ── LIVE API ───────────────────────────────────────────────────────────────────
const liveApi = {
  // GreenLake: add device (v1 POST with nested network array, async)
  async glAddDevice({ serial, mac, tags, locationId, token }) {
    const deviceEntry = { serialNumber: serial };
    if (mac) deviceEntry.macAddress = mac;
    if (tags && Object.keys(tags).length > 0) deviceEntry.tags = tags;
    if (locationId) deviceEntry.location = { id: locationId };
    const body = { network: [deviceEntry], compute: [], storage: [] };

    const addUrl = `${GL_BASE}/devices/v1/devices`;
    const res = await proxyCall({ url: addUrl, method: 'POST', token, body });
    if (res.status === 202) {
      const loc = res.headers.get('location');
      if (loc) {
        try {
          await pollAsync(`${GL_BASE}${loc}`, token);
        } catch (pollErr) {
          // Async add failed — most common cause is device already exists in GreenLake.
          // Don't throw yet; fall through to the lookup below and use the existing record.
          console.warn('[glAddDevice] async op failed — checking if device already exists:', pollErr.message);
        }
      }
      // Brief pause — GreenLake sometimes needs a moment before the device
      // is ready to accept PATCH operations after the initial add.
      await delay(3000);
      // Fetch the device by serial — works whether just added or already present
      const devRes = await proxyCall({ url: `${GL_BASE}/devices/v1/devices?filter=serialNumber eq '${serial}'`, token });
      if (!devRes.ok) throw new Error(`Could not retrieve device after add: ${devRes.status}`);
      const d = await devRes.json();
      const device = (d.items || [])[0];
      if (!device) throw new Error(`Device add failed and device not found in GreenLake: ${serial}`);
      console.log('[glAddDevice] using device:', device.id, '— assignedState:', device.assignedState, '| model:', device.model, '| partNumber:', device.partNumber);
      // Explicitly PATCH location — the initial POST body may not link it reliably.
      if (locationId && device.id) {
        const locPatch = await proxyCall({
          url: `${GL_BASE}/devices/v2beta1/devices?id=${encodeURIComponent(device.id)}`,
          method: 'PATCH', token,
          body: { location: { id: locationId } },
        });
        if (locPatch.status === 202) {
          const locOp = locPatch.headers.get('location');
          if (locOp) await pollAsync(`${GL_BASE}${locOp}`, token).catch(e => console.warn('[glAddDevice] location patch poll:', e.message));
        } else if (!locPatch.ok) {
          console.warn('[glAddDevice] location PATCH failed:', locPatch.status, await locPatch.text().catch(() => ''));
        }
      }
      return device;
    }
    if (!res.ok) {
      const errBody = await res.text();
      // Auth failures: throw immediately — a device lookup would also fail.
      if (res.status === 401 || res.status === 403) {
        throw new Error(`Add device error ${res.status}: ${errBody}`);
      }
      // Any other failure (409 conflict, 400, 5xx…): the device may already
      // exist in GreenLake. Try to find it by serial before giving up.
      console.warn('[glAddDevice] POST returned', res.status, '— checking if device already exists in GreenLake…');
      const lookupRes = await proxyCall({ url: `${GL_BASE}/devices/v1/devices?filter=serialNumber eq '${serial}'`, token });
      if (lookupRes.ok) {
        const ld = await lookupRes.json();
        const existing = (ld.items || [])[0];
        if (existing) {
          console.log('[glAddDevice] found existing device:', existing.id, '— skipping add, updating attributes');
          // Apply tags and location to the existing device — these were in the
          // failed POST body but never sent.  Use the same PATCH pattern as new devices.
          const patches = [];
          if (tags && Object.keys(tags).length > 0) {
            patches.push(
              proxyCall({
                url: `${GL_BASE}/devices/v2beta1/devices?id=${encodeURIComponent(existing.id)}`,
                method: 'PATCH', token, body: { tags },
              }).then(async r => {
                if (r.status === 202) {
                  const op = r.headers.get('location');
                  if (op) await pollAsync(`${GL_BASE}${op}`, token).catch(e => console.warn('[glAddDevice] tags patch poll:', e.message));
                } else if (!r.ok) {
                  console.warn('[glAddDevice] tags PATCH failed:', r.status, await r.text().catch(() => ''));
                }
              })
            );
          }
          if (locationId) {
            patches.push(
              proxyCall({
                url: `${GL_BASE}/devices/v2beta1/devices?id=${encodeURIComponent(existing.id)}`,
                method: 'PATCH', token, body: { location: { id: locationId } },
              }).then(async r => {
                if (r.status === 202) {
                  const op = r.headers.get('location');
                  if (op) await pollAsync(`${GL_BASE}${op}`, token).catch(e => console.warn('[glAddDevice] location patch poll:', e.message));
                } else if (!r.ok) {
                  console.warn('[glAddDevice] location PATCH failed:', r.status, await r.text().catch(() => ''));
                }
              })
            );
          }
          if (patches.length) await Promise.all(patches);
          return { ...existing, foundExisting: true };
        }
      }
      // Device not found — surface the original POST error.
      const allowHdr = res.headers.get('allow');
      const wwwAuth  = res.headers.get('www-authenticate');
      let msg = `Add device error ${res.status}: ${errBody}`;
      if (allowHdr) msg += ` [Allow: ${allowHdr}]`;
      if (wwwAuth)  msg += ` [WWW-Authenticate: ${wwwAuth}]`;
      throw new Error(msg);
    }
    return res.json();
  },

  // GreenLake: list active subscriptions.
  // Filter to subscriptionStatus eq 'STARTED' to exclude expired/inactive ones
  // (status 'NONE') — assigning those causes GreenLake 500 errors.
  // Do NOT filter on availableQuantity — some valid subscriptions report 0
  // available in the API even though they can still be assigned (pooled/flex).
  async glGetSubscriptions({ token }) {
    // Decode the JWT to log which workspace/customer the token is scoped to.
    try {
      const payload = JSON.parse(atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
      console.log('[glGetSubscriptions] token claims:', {
        sub: payload.sub, cid: payload.cid, iss: payload.iss,
        workspace_id: payload.workspace_id, customer_id: payload.customer_id,
        aud: payload.aud,
      });
    } catch (_) { console.warn('[glGetSubscriptions] could not decode token'); }

    // Fetch all subscriptions without a status filter so nothing is silently
    // excluded server-side.  We filter client-side by type/tier/sku instead.
    const url = `${GL_BASE}/subscriptions/v1/subscriptions?limit=100`;
    console.log('[glGetSubscriptions] GET', url);
    const res = await proxyCall({ url, token });
    if (!res.ok) throw new Error(`Subscriptions error ${res.status}`);
    const d = await res.json();
    // API returns snake_case: subscriptions[] + pagination, OR camelCase: items[] + total
    const raw = d.items || d.subscriptions || [];
    const today = new Date(); today.setHours(0, 0, 0, 0);

    // Helper: resolve expiration date from any known field name / format.
    // Public GL API uses "endTime" (ISO string).
    // Internal GL UI API nests it at appointments.subscription_end (Unix ms).
    const resolveExpiry = s => {
      if (s.endTime)        return new Date(s.endTime);        // ← public GL API
      if (s.expirationDate) return new Date(s.expirationDate);
      if (s.endDate)        return new Date(s.endDate);
      if (s.expiry)         return new Date(s.expiry);
      const apptEnd = s.appointments?.subscription_end;
      if (apptEnd)          return new Date(typeof apptEnd === 'number' ? apptEnd : Number(apptEnd));
      return null;
    };

    console.log(`[glGetSubscriptions] total=${d.total ?? d.pagination?.total_count} returned=${raw.length}`);

    // Drop expired/ended subscriptions using all known status field names.
    // The GreenLake public API uses snake_case: license_state_type: "Ended"
    // Some clusters return camelCase equivalents. NONE/null = valid perpetual sub.
    const DEAD_STATUSES = new Set(['ENDED', 'EXPIRED', 'TERMINATED', 'CANCELLED', 'CANCELED']);
    const active = raw.filter(s => {
      const key = s.subscriptionKey || s.subscription_key || s.key || '(unknown)';
      // Check every possible status field name, camelCase and snake_case
      const st = (
        s.licenseStateType    || s.license_state_type ||
        s.subscriptionStatus  || s.subscription_status ||
        s.status || s.subscriptionState || s.state || ''
      ).toUpperCase();
      if (DEAD_STATUSES.has(st)) return false;
      // Expiration date safety net (covers cases where status field is missing/null)
      const exp = resolveExpiry(s);
      if (exp && !isNaN(exp) && exp < today) return false;
      return true;
    });
    console.log('[glGetSubscriptions] active after client filter:', active.length);

    // Normalise to camelCase — handle both snake_case (real API) and camelCase fields.
    return active.map(s => {
      const exp = resolveExpiry(s);
      return {
        ...s,
        id:               s.id                || s.subscriptionKey    || s.subscription_key || s.key,
        key:              s.subscriptionKey   || s.subscription_key   || s.key              || s.id,
        subscriptionType: s.subscriptionType  || s.subscription_type  || s.type             || '',
        skuDescription:   s.skuDescription    || s.product_description || s.productDescription || s.productName || s.name || '',
        tier:             s.tier              || s.subscription_tier_description || s.subscriptionTierDescription || '',
        availableQuantity: s.availableQuantity ?? s.available_quantity ?? s.available ?? 0,
        expirationDate:   exp ? exp.toISOString() : null,
      };
    });
  },

  // GreenLake: collect unique tag key/value pairs from existing devices.
  // There is no standalone workspace tags endpoint — tags live on the devices themselves.
  async glGetTags({ token }) {
    const res = await proxyCall({ url: `${GL_BASE}/devices/v1/devices?limit=100`, token });
    if (!res.ok) {
      console.warn('[glGetTags] devices fetch failed:', res.status);
      return [];
    }
    const d = await res.json();
    const seen = new Set();
    const tags = [];
    for (const device of (d.items || [])) {
      for (const [key, value] of Object.entries(device.tags || {})) {
        const sig = `${key}::${value}`;
        if (!seen.has(sig)) { seen.add(sig); tags.push({ key, value }); }
      }
    }
    console.log('[glGetTags] extracted', tags.length, 'unique tag(s) from', (d.items || []).length, 'device(s)');
    return tags;
  },

  // GreenLake: list locations
  async glGetLocations({ token }) {
    const res = await proxyCall({ url: `${GL_BASE}/locations/v1/locations?limit=100`, token });
    if (!res.ok) return [];
    const d = await res.json();
    return d.items || [];
  },

  // GreenLake: list workspace users (identity v1)
  async glGetUsers({ token }) {
    const res = await proxyCall({ url: `${GL_BASE}/identity/v1/users?limit=100`, token });
    if (!res.ok) return [];
    const d = await res.json();
    return d.items || [];
  },

  // GreenLake: invite / create a new user
  async glInviteUser({ firstName, lastName, email, token }) {
    const res = await proxyCall({
      url: `${GL_BASE}/identity/v1/users`,
      method: 'POST', token,
      body: { email, profile: { firstName, lastName }, sendWelcomeEmail: true },
    });
    if (!res.ok) throw new Error(`Create user error ${res.status}: ${await res.text()}`);
    return res.json();
  },

  // GreenLake: create location
  async glCreateLocation({ name, address, token }) {
    const body = {
      name,
      addresses: [{ streetaddress: address.street, city: address.city, state: address.state, postalCode: address.zip, country: address.country }],
    };
    const res = await proxyCall({ url: `${GL_BASE}/locations/v1/locations`, method: 'POST', token, body });
    if (!res.ok) throw new Error(`Create location error ${res.status}: ${await res.text()}`);
    return res.json();
  },

  // GreenLake: fetch provisioned services for this workspace.
  // Step 1 — my-services: region-indexed list of provisioned service IDs + regions.
  //   items[i] = { id: "region-id", provisions: [{ serviceManagerProvision: { serviceManager: {id}, region, provisionStatus } }] }
  // Step 2 — for each unique service ID, fetch the service-manager record to get the display name.
  async glGetApplications({ token }) {
    const msRes = await proxyCall({ url: `${GL_BASE}/service-catalog/v1beta1/my-services`, token });
    if (!msRes.ok) throw new Error(`Service catalog error ${msRes.status}: ${await msRes.text()}`);
    const msData = await msRes.json();
    console.log(`[glGetApplications] my-services: ${msData.items?.length ?? 0} services`);

    // Extract { smId, region } pairs for all PROVISIONED entries
    const provisioned = [];
    for (const regionItem of (msData.items || [])) {
      const regionId = regionItem.id;
      for (const p of (regionItem.provisions || [])) {
        const smp = p.serviceManagerProvision;
        if (!smp) continue;
        if (smp.provisionStatus && smp.provisionStatus !== 'PROVISIONED') continue;
        const smId = smp.serviceManager?.id;
        if (!smId) continue;
        // Try common name fields first; if missing we'll fetch below
        // serviceOffer.name (sibling of serviceManagerProvision) has the display name
        const nameHint = p.serviceOffer?.name || smp.serviceManagerName || smp.serviceManager?.name || smp.name || null;
        const smUri = smp.serviceManager?.resourceUri || null; // e.g. /service-catalog/v1beta1/service-managers/{id}
        provisioned.push({ smId, nameHint, smUri, region: smp.region || regionId });
      }
    }

    // Fetch display names for any entry that didn't have one inline
    const nameCache = {};
    await Promise.all(
      provisioned
        .filter(p => !p.nameHint)
        .map(async p => {
          if (nameCache[p.smId]) return;
          try {
            // Use the resourceUri from the response (v1beta1) rather than assuming v1
            const fetchUrl = p.smUri ? `${GL_BASE}${p.smUri}` : `${GL_BASE}/service-catalog/v1beta1/service-managers/${p.smId}`;
            const r = await proxyCall({ url: fetchUrl, token });
            if (r.ok) {
              const d = await r.json();
              nameCache[p.smId] = d.name || d.id || p.smId;
            }
          } catch (_) { /* ignore — fall back to ID */ }
          if (!nameCache[p.smId]) nameCache[p.smId] = p.smId;
        })
    );

    const apps = provisioned.map(p => ({
      id:     p.smId,
      name:   p.nameHint || nameCache[p.smId] || p.smId,
      region: p.region,
    }));

    // Sort: Aruba Central variants first, then alphabetical
    apps.sort((a, b) => {
      const aC = (a.name || '').toLowerCase().includes('central');
      const bC = (b.name || '').toLowerCase().includes('central');
      if (aC && !bC) return -1;
      if (!aC && bC) return 1;
      return (a.name || '').localeCompare(b.name || '');
    });
    return apps;
  },

  // GreenLake: fetch regions where a specific application is deployed.
  // per-region structure: [{ id: "region-id", regionName: "...", serviceManagers: [{id, name}] }]
  // Returns [{ id, name }] objects so the UI can show a proper label.
  async glGetApplicationRegions({ applicationId, token }) {
    const regionRes = await proxyCall({ url: `${GL_BASE}/service-catalog/v1/per-region-service-managers?limit=100`, token });
    if (!regionRes.ok) return [];
    const regionItems = (await regionRes.json()).items || [];

    const regions = [];
    for (const region of regionItems) {
      const hasApp = (region.serviceManagers || []).some(sm => sm.id === applicationId);
      if (hasApp) regions.push({ id: region.id, name: region.regionName || region.id });
    }
    return regions;
  },

  // GreenLake: PATCH — assign subscription (async)
  // The v2beta1 PATCH endpoint requires the device id as a query parameter, not in the body.
  // The body must use subscription.id (UUID), not subscription.key.
  async glAssignSubscription({ deviceId, subscriptionId, token }) {
    const res = await proxyCall({
      url: `${GL_BASE}/devices/v2beta1/devices?id=${encodeURIComponent(deviceId)}`,
      method: 'PATCH',
      token,
      body: { subscription: [{ id: subscriptionId }] },
    });
    if (res.status === 202) {
      const loc = res.headers.get('location');
      if (loc) await pollAsync(`${GL_BASE}${loc}`, token);
      return { success: true };
    }
    if (!res.ok) throw new Error(`Assign subscription error ${res.status}: ${await res.text()}`);
    return res.json();
  },

  // GreenLake: PATCH — assign application (async)
  // Same pattern: id goes in query string, changes go in body.
  async glAssignApplication({ deviceId, applicationId, region, token }) {
    const res = await proxyCall({
      url: `${GL_BASE}/devices/v2beta1/devices?id=${encodeURIComponent(deviceId)}`,
      method: 'PATCH',
      token,
      body: { application: { id: applicationId }, region },
    });
    if (res.status === 202) {
      const loc = res.headers.get('location');
      if (loc) await pollAsync(`${GL_BASE}${loc}`, token);
      return { success: true };
    }
    if (!res.ok) throw new Error(`Assign application error ${res.status}: ${await res.text()}`);
    return res.json();
  },

  // Central: list sites.
  // Standard clusters expose sites on the cluster URL.
  // The HPE Internal cluster (internal.api.central.arubanetworks.com) uses the
  // GreenLake NRM API instead — same GL bearer token, different base URL.
  async centralGetSites({ centralToken, centralUrl, token }) {
    const paths = [
      '/configuration/v2/sites?limit=500',
      '/monitoring/v2/sites?limit=500',
      '/network-config/v1alpha1/sites',          // no params — limit= causes 400 on internal cluster
      '/network-config/v1alpha1/sites?limit=100', // smaller limit in case 500 is out of range
      '/configuration/v1/sites?limit=500',
      '/platform/v1/sites?limit=500',
    ];
    console.log('[centralGetSites] cluster URL:', centralUrl);
    for (const path of paths) {
      const url = `https://${centralUrl}${path}`;
      const res = await proxyCall({ url, token: centralToken });
      console.log('[centralGetSites] tried', path, '→', res.status);
      if (!res.ok) continue;
      const d = await res.json();
      const raw = d.sites || d.items || d.data || [];
      // Normalize field names — older API uses site_id/site_name, newer uses id/scopeName
      return raw.map(s => ({
        id:      s.id      ?? s.site_id  ?? s.scopeId,
        name:    s.name    || s.site_name || s.scopeName || String(s.id || s.site_id),
        city:    s.city    || '',
        state:   s.state   || '',
        country: s.country || '',
      }));
    }

    // Fallback: GreenLake NRM API (used by the Internal cluster and potentially
    // other special clusters where Central doesn't expose the sites REST path).
    // Sites here have type "network-config/sites" with scopeId / scopeName fields.
    if (token) {
      console.log('[centralGetSites] all Central paths failed — trying GreenLake NRM...');
      const glRes = await proxyCall({ url: `${GL_BASE}/network-config/v1alpha1/sites`, token });
      console.log('[centralGetSites] GreenLake NRM →', glRes.status);
      if (glRes.ok) {
        const d = await glRes.json();
        const raw = d.items || d.sites || [];
        return raw.map(s => ({
          id:      String(s.id ?? s.scopeId ?? ''),
          name:    s.name    || s.scopeName || String(s.id ?? ''),
          city:    s.city    || '',
          state:   s.state   || '',
          country: s.country || '',
          _source: 'greenlake-nrm',  // tag so assign can use the right API
        }));
      }
    }

    throw new Error(`Sites API not available on cluster: ${centralUrl}`);
  },

  // Central: assign a device to a site.
  // Site assignment is attempted but ALWAYS soft-fails on error — it never blocks provisioning.
  // The site dropdown in the UI is kept so users can record their intended assignment,
  // but the API endpoint is not universally available across cluster types.
  //
  // Standard (public clusters): POST /configuration/v2/devices/move  or  /configuration/v1/devices/move
  //   Body: { "serials": ["SERIAL"], "site_id": <int> }
  // NRM / Internal cluster: POST /network-config/v1/site-add-devices
  //   Body: { "devices": ["SERIAL"], "desScopeId": "SCOPE_ID_STRING" }
  async centralAssignSite({ serial, siteId, centralToken, centralUrl }) {
    if (!siteId) throw Object.assign(new Error('No site selected'), { softFail: true });

    const softFail = msg => { throw Object.assign(new Error(msg), { softFail: true }); };

    // Standard paths (public clusters)
    const rawBody = `{"serials":${JSON.stringify([serial])},"site_id":${siteId}}`;
    for (const path of ['/configuration/v2/devices/move', '/configuration/v1/devices/move']) {
      const res = await proxyCall({
        url: `https://${centralUrl}${path}`,
        method: 'POST', token: centralToken,
        body: rawBody, contentType: 'application/json',
      });
      console.log('[centralAssignSite] tried', path, '→', res.status);
      if (res.status === 404) continue;
      if (!res.ok) {
        const txt = await res.text();
        console.warn('[centralAssignSite] soft-fail on', path, res.status, txt);
        softFail(`Site assignment not available on this cluster (${res.status}) — assign the site manually in Aruba Central`);
      }
      return res.json().catch(() => ({ success: true }));
    }

    // NRM paths (internal cluster / New Central) — desScopeId is a string scope ID
    const nrmBody = { devices: [serial], desScopeId: String(siteId) };
    for (const path of ['/network-config/v1/site-add-devices', '/network-config/v1alpha1/site-add-devices']) {
      const res = await proxyCall({
        url: `https://${centralUrl}${path}`,
        method: 'POST', token: centralToken, body: nrmBody,
      });
      console.log('[centralAssignSite] NRM tried', path, '→', res.status);
      if (res.status === 404) continue;
      if (!res.ok) {
        const txt = await res.text();
        console.warn('[centralAssignSite] NRM soft-fail on', path, res.status, txt);
        softFail(`Site assignment not available on this cluster (${res.status}) — assign the site manually in Aruba Central`);
      }
      return res.json().catch(() => ({ success: true }));
    }

    console.warn('[centralAssignSite] soft-fail — all paths exhausted on', centralUrl);
    softFail('Site assignment not available on this cluster — assign the site manually in Aruba Central');
  },

  // Central: assign device function (persona).
  // Endpoint: POST /network-config/v1alpha1/persona-assignment/{persona}
  // Body formats vary by cluster version:
  //   v2 body: { "device-id-list-v2": ["SERIAL_OR_UUID"] }      ← preferred
  //   v1 body: { "device-id": ["SERIAL_OR_UUID"] }
  //   list body: { "persona-device-list": ["SERIAL"] }           ← some clusters
  //   old URL: POST /network-config/v1alpha1/persona-assignment
  //            body: { "persona-device-list": [{ "device-function": persona, "device-id": ["SERIAL"] }] }
  // If all attempts return 400 (e.g. "Feature flag disabled for this device type"), soft-fail.
  async centralAssignFunction({ deviceId, serial, persona, centralToken, centralUrl }) {
    const newUrl = `https://${centralUrl}/network-config/v1alpha1/persona-assignment/${persona}`;
    const oldUrl = `https://${centralUrl}/network-config/v1alpha1/persona-assignment`;
    const attempts = [
      // Old URL (persona in body) — confirmed working on internal clusters
      { label: 'old+serial', url: oldUrl, body: { 'persona-device-list': [{ 'device-function': persona, 'device-id': [serial] }] } },
      { label: 'old+uuid',   url: oldUrl, body: { 'persona-device-list': [{ 'device-function': persona, 'device-id': [deviceId] }] } },
      // New URL — try body formats in order of likelihood
      { label: 'new+serial+v2',  url: newUrl, body: { 'device-id-list-v2': [serial] } },
      { label: 'new+uuid+v2',    url: newUrl, body: { 'device-id-list-v2': [deviceId] } },
      { label: 'new+serial+id',  url: newUrl, body: { 'device-id': [serial] } },
      { label: 'new+uuid+id',    url: newUrl, body: { 'device-id': [deviceId] } },
      { label: 'new+serial+plist', url: newUrl, body: { 'persona-device-list': [serial] } },
      { label: 'new+uuid+plist',   url: newUrl, body: { 'persona-device-list': [deviceId] } },
    ];
    const errors = [];
    for (const attempt of attempts) {
      const res = await proxyCall({ url: attempt.url, method: 'POST', token: centralToken, body: attempt.body });
      const errTxt = res.status !== 200 && res.status !== 204 ? await res.clone().text() : '';
      console.log(`[centralAssignFunction] ${attempt.label} → ${res.status}`, errTxt ? errTxt.slice(0, 200) : 'OK');
      if (res.status === 400) { errors.push(`[${attempt.label}] ${errTxt}`); continue; }
      if (!res.ok) throw new Error(`Function assignment error ${res.status}: ${errTxt}`);
      return res.json().catch(() => ({ success: true }));
    }
    // All 400s — feature may be disabled for this device type on this cluster.
    // Treat as soft failure so the rest of provisioning still completes.
    const featureDisabled = errors.some(e => e.toLowerCase().includes('feature flag'));
    const softMsg = featureDisabled
      ? 'Function/persona assignment is not enabled for this device type on your cluster — assign manually in Aruba Central'
      : `Function assignment failed (all formats rejected — assign manually in Aruba Central):\n${errors.map(e => e.slice(0, 200)).join('\n')}`;
    throw Object.assign(new Error(softMsg), { softFail: true });
  },

  // Central: GET device name from monitoring API. Silent failure — device may not be online yet.
  async centralGetSystemInfo({ serial, deviceType, centralToken, centralUrl }) {
    const type = (deviceType || '').toUpperCase();
    const monPaths = [];
    if (type === 'AP' || type === 'IAP') monPaths.push(`/network-monitoring/v1alpha1/aps/${encodeURIComponent(serial)}`);
    else if (type.includes('SWITCH'))   monPaths.push(`/network-monitoring/v1alpha1/switches/${encodeURIComponent(serial)}`);
    else if (type === 'GATEWAY' || type === 'GW') monPaths.push(`/network-monitoring/v1alpha1/gateways/${encodeURIComponent(serial)}`);
    // Generic fallbacks
    monPaths.push(`/network-monitoring/v1alpha1/aps/${encodeURIComponent(serial)}`);
    monPaths.push(`/network-monitoring/v1alpha1/switches/${encodeURIComponent(serial)}`);

    // Step 1: fetch deviceName from monitoring API (read-only)
    let monData = null;
    for (const path of [...new Set(monPaths)]) {
      try {
        const res = await proxyCall({ url: `https://${centralUrl}${path}`, token: centralToken });
        console.log('[centralGetSystemInfo] monitoring', path, '→', res.status);
        if (res.ok) {
          monData = await res.json();
          console.log('[centralGetSystemInfo] deviceName:', monData.deviceName, '| serial:', monData.serialNumber);
          break;
        }
      } catch (e) { console.warn('[centralGetSystemInfo] monitoring fail:', path, e.message); }
    }

    // Step 2: discover the numeric scope_id needed for config PATCH.
    // The config layer uses a large integer scope_id stored as scopeId/scopeName pairs
    // in /network-config/v1alpha1/devices — scopeName equals the device's serial number.
    // Note: ?serial= query param does NOT filter the results; we fetch all and match client-side.
    let numericScopeId = null;

    // The /network-config/v1alpha1/devices API requires a ?serial= param to return 200
    // (it ignores the value and returns all devices, but omitting it triggers a 400).
    // Each item in the list has scopeName (= device serial) and scopeId (= numeric config ID).
    // We match by scopeName to find the target device's scopeId.
    try {
      const res = await proxyCall({
        url: `https://${centralUrl}/network-config/v1alpha1/devices?serial=${encodeURIComponent(serial)}`,
        token: centralToken,
      });
      console.log('[centralGetSystemInfo] config devices →', res.status);
      if (res.ok) {
        const d = await res.json();
        const items = d.items || d.devices || (Array.isArray(d) ? d : []);
        // Log ALL scopeNames so we can confirm which devices are in the list
        console.log('[centralGetSystemInfo] config devices scopeNames:', items.map(i => i.scopeName).join(', '));
        const match = items.find(item =>
          String(item.scopeName || item.serialNumber || item.serial || '').toUpperCase() === serial.toUpperCase()
        );
        if (match) {
          // Log full match so we can see every field and confirm the correct scopeId
          console.log('[centralGetSystemInfo] matched device:', JSON.stringify(match));
          const raw = match.scope_id || match.scopeId || match.uid || match.id;
          if (raw && /^\d+$/.test(String(raw))) {
            numericScopeId = String(raw);
            console.log('[centralGetSystemInfo] scopeId for PATCH:', numericScopeId);
          }
        } else {
          console.warn('[centralGetSystemInfo] VNT9M5904F not found in config devices list');
        }
      } else {
        const errTxt = await res.clone().text().catch(() => '');
        console.warn('[centralGetSystemInfo] config devices 400 body:', errTxt.slice(0, 200));
      }
    } catch (e) { console.warn('[centralGetSystemInfo] config devices fail:', e.message); }

    console.log('[centralGetSystemInfo] numericScopeId:', numericScopeId, '| deviceName:', monData?.deviceName);
    if (!monData && !numericScopeId) return null;
    return { ...(monData || {}), _scopeId: numericScopeId };
  },

  // Central: set/update device hostname via the config API.
  // Correct endpoint: PATCH /network-config/v1alpha1/system-info?scope-id={numericId}
  // The scope-id must be a large numeric integer — the serial string is NOT valid here.
  // Body: { "hostname": "new-name" }   (hostname-alias defaults to sys_host_name)
  async centralSetHostname({ serial, hostname, scopeId, centralToken, centralUrl }) {
    const errors = [];
    const body = { hostname };

    // Attempt 1 — numeric scope_id (correct path, requires scope_id from centralGetSystemInfo)
    if (scopeId) {
      const url = `https://${centralUrl}/network-config/v1alpha1/system-info?scope-id=${encodeURIComponent(scopeId)}`;
      console.log(`[centralSetHostname] PATCH (numeric scope_id=${scopeId})`, url);
      const res = await proxyCall({ url, method: 'PATCH', token: centralToken, body });
      const txt = !res.ok ? await res.clone().text() : '';
      console.log('[centralSetHostname] numeric scope →', res.status, txt || 'OK');
      if (res.ok) return res.json().catch(() => ({ success: true }));
      errors.push(`PATCH system-info?scope-id=${scopeId} → ${res.status}: ${txt.slice(0, 200)}`);
    } else {
      console.warn('[centralSetHostname] no numeric scope_id available — skipping primary attempt');
    }

    // Attempt 2 — try POST (create) and PATCH with the hostname-alias form, numeric scope_id
    if (scopeId) {
      const url = `https://${centralUrl}/network-config/v1alpha1/system-info?scope-id=${encodeURIComponent(scopeId)}`;
      const bodyAlias = { hostname, 'hostname-alias': 'sys_host_name' };
      console.log(`[centralSetHostname] POST (alias form, scope_id=${scopeId})`);
      const res = await proxyCall({ url, method: 'POST', token: centralToken, body: bodyAlias });
      const txt = !res.ok ? await res.clone().text() : '';
      console.log('[centralSetHostname] POST alias →', res.status, txt || 'OK');
      if (res.ok) return res.json().catch(() => ({ success: true }));
      errors.push(`POST system-info?scope-id=${scopeId} (alias) → ${res.status}: ${txt.slice(0, 200)}`);
    }

    // Attempt 3 — fallback: try old-style management endpoints by device type (serial-based)
    // These are less likely to work but better than nothing
    const fallbacks = [
      { method: 'PATCH', path: `/configuration/v1/devices/${encodeURIComponent(serial)}`, body: { hostname } },
      { method: 'PATCH', path: `/configuration/v2/devices/${encodeURIComponent(serial)}`, body: { hostname } },
    ];
    for (const { method, path, body: fb } of fallbacks) {
      try {
        const res = await proxyCall({ url: `https://${centralUrl}${path}`, method, token: centralToken, body: fb });
        const txt = !res.ok ? await res.clone().text() : '';
        console.log(`[centralSetHostname] fallback ${method} ${path} →`, res.status, txt || 'OK');
        if (res.ok) return res.json().catch(() => ({ success: true }));
        if (res.status !== 404) errors.push(`${method} ${path} → ${res.status}: ${txt.slice(0, 150)}`);
      } catch (e) { errors.push(`${method} ${path} → ${e.message}`); }
    }

    throw new Error(`Hostname update failed — numeric scope_id ${scopeId ? 'provided but rejected' : 'not found'}.\n${errors.join('\n')}`);
  },
};

// ── BARCODE PARSER ─────────────────────────────────────────────────────────────
function normaliseMac(hex) {
  return hex.replace(/[:\-]/g,'').replace(/(.{2})/g,'$1:').slice(0,-1).toUpperCase();
}
function parseBarcode(raw) {
  raw = raw.trim();
  // Combined: "SN:XXXXX;MAC:XX:XX:XX:XX:XX:XX"
  let m = raw.match(/SN[:\s]+([A-Z0-9]+)[;\s,]+MAC[:\s]+([0-9A-Fa-f:]{17})/i);
  if (m) return { serial: m[1].toUpperCase(), mac: m[2].toUpperCase() };
  // Combined: "SERIAL/MACRAW12HEX"
  m = raw.match(/^([A-Z0-9]{8,14})\/([0-9A-Fa-f]{12})$/i);
  if (m) return { serial: m[1].toUpperCase(), mac: normaliseMac(m[2]) };
  // Combined: "serial=xxx mac=xxx"
  const serialM = raw.match(/serial[=:\s]+([A-Z0-9]{8,14})/i);
  if (serialM) {
    const macM = raw.match(/mac[=:\s]+([0-9A-Fa-f:]{17})/i);
    return { serial: serialM[1].toUpperCase(), mac: macM ? macM[1].toUpperCase() : null };
  }
  // MAC-only: bare 12 hex chars e.g. "000B86B86418"
  m = raw.match(/^([0-9A-Fa-f]{12})$/i);
  if (m) return { serial: null, mac: normaliseMac(m[1]) };
  // MAC-only: colon/dash separated e.g. "00:0B:86:B8:64:18"
  m = raw.match(/^([0-9A-Fa-f]{2}[:\-]){5}[0-9A-Fa-f]{2}$/i);
  if (m) return { serial: null, mac: raw.replace(/-/g,':').toUpperCase() };
  // MAC-only: prefixed "MAC:000B86B86418"
  m = raw.match(/^MAC[:\s]+([0-9A-Fa-f]{12,17})$/i);
  if (m) return { serial: null, mac: normaliseMac(m[1].replace(/[:\-]/g,'')) };
  // Serial-only
  m = raw.match(/^([A-Z0-9]{8,14})$/i);
  if (m) return { serial: m[1].toUpperCase(), mac: null };
  return { serial: raw, mac: null };
}

// ── BARCODE SCANNER ────────────────────────────────────────────────────────────
// continuous=true: 2 s cooldown between scans so multiple barcodes can be read
// continuous=false (default): fires once and stops (legacy behaviour)
const BarcodeScanner = ({ onScan, onCameraError, continuous = false }) => {
  const cooldownRef  = useRef(false);
  const lastValueRef = useRef(null);
  const confirmCount = useRef(0);
  const CONFIRM_NEEDED = 3; // same value must decode this many times before accepting

  useEffect(() => {
    const scanner = new Html5Qrcode('qr-reader-div');
    scanner.start(
      { facingMode: 'environment' },
      { fps: 20, qrbox: { width: 280, height: 130 }, aspectRatio: 1.6 },
      (text) => {
        if (cooldownRef.current) return;
        // Multi-scan confirmation: require CONFIRM_NEEDED consecutive identical reads
        if (text === lastValueRef.current) {
          confirmCount.current += 1;
        } else {
          lastValueRef.current = text;
          confirmCount.current = 1;
        }
        if (confirmCount.current < CONFIRM_NEEDED) return;
        // Confirmed — reset and fire
        lastValueRef.current = null;
        confirmCount.current = 0;
        cooldownRef.current = true;
        onScan(text);
        if (continuous) {
          setTimeout(() => { cooldownRef.current = false; }, 2000);
        }
      },
      () => {}
    ).catch(() => onCameraError('Camera access denied. Use manual entry below.'));
    return () => { scanner.isScanning && scanner.stop().catch(() => {}); };
  }, []);

  return (
    <div className="relative bg-black rounded-2xl overflow-hidden">
      <div id="qr-reader-div" />
      <div className="absolute inset-0 pointer-events-none flex items-center justify-center">
        <div className="relative" style={{ width: 260, height: 120 }}>
          {[['top-0 left-0','border-t-2 border-l-2 rounded-tl-lg'],['top-0 right-0','border-t-2 border-r-2 rounded-tr-lg'],
            ['bottom-0 left-0','border-b-2 border-l-2 rounded-bl-lg'],['bottom-0 right-0','border-b-2 border-r-2 rounded-br-lg']
          ].map(([pos, cls]) => <div key={pos} className={`absolute ${pos} w-6 h-6 border-emerald-400 ${cls}`} />)}
          <div className="absolute inset-x-0 top-1/2 h-px bg-emerald-400 opacity-60 animate-pulse" />
        </div>
      </div>
    </div>
  );
};

const ScanScreen = ({ settings, onScanned, onOpenSettings }) => {
  const [fields, setFields] = useState({ serial: '', mac: '' });
  const [lastScan, setLastScan] = useState(null);
  const [scanCount, setScanCount] = useState(0);
  const [cameraErr, setCameraErr] = useState('');
  const [pendingScan, setPendingScan] = useState(null); // raw string waiting for confirmation
  const confirmTimer = useRef(null);

  const processScan = useCallback(raw => {
    const result = parseBarcode(raw);
    if (!result.serial && !result.mac) return;
    setFields(prev => {
      const next = { ...prev };
      if (result.serial) next.serial = result.serial;
      if (result.mac)    next.mac    = result.mac;
      return next;
    });
    setScanCount(n => n + 1);
    if (result.serial && result.mac) setLastScan({ label: 'Serial + MAC captured' });
    else if (result.serial)          setLastScan({ label: `Serial captured: ${result.serial}` });
    else                             setLastScan({ label: `MAC captured: ${result.mac}` });
  }, []);

  const confirmScan = useCallback(raw => {
    clearTimeout(confirmTimer.current);
    setPendingScan(null);
    processScan(raw);
  }, [processScan]);

  const dismissScan = useCallback(() => {
    clearTimeout(confirmTimer.current);
    setPendingScan(null);
  }, []);

  const handleScan = useCallback(raw => {
    const result = parseBarcode(raw);
    if (!result.serial && !result.mac) return;
    if (settings.scanConfirm ?? true) {
      clearTimeout(confirmTimer.current);
      setPendingScan(raw);
      confirmTimer.current = setTimeout(() => {
        setPendingScan(null);
        processScan(raw);
      }, SCAN_CONFIRM_MS);
    } else {
      processScan(raw);
    }
  }, [settings.scanConfirm, processScan]);

  const canContinue = fields.serial.trim().length > 0 && fields.mac.trim().length > 0;

  // Hint text tells the user what's still missing
  const hint = !fields.serial && !fields.mac ? 'Scan one barcode at a time — S/N or MAC, either order'
             : !fields.serial                 ? 'MAC captured — now scan the Serial Number barcode'
             : !fields.mac                    ? 'Serial captured — now scan the MAC barcode'
             :                                  'Both captured — verify below and tap Continue';

  return (
    <div className="p-5 space-y-4 step-enter">
      <div className="flex items-center justify-between pt-2">
        <div>
          <h2 className="text-white font-bold text-xl">Scan Device</h2>
          <p className="text-gray-400 text-sm">Scan S/N and MAC barcodes — one at a time</p>
        </div>
        <button onClick={onOpenSettings} className="w-9 h-9 bg-white bg-opacity-10 rounded-xl flex items-center justify-center text-base">⚙️</button>
      </div>

      {settings.demoMode && (
        <div className="flex items-center gap-2 bg-yellow-500 bg-opacity-10 border border-yellow-500 border-opacity-25 rounded-xl px-3 py-2.5">
          <span className="text-yellow-400 text-xs font-semibold">🧪 Demo Mode — no real API calls</span>
        </div>
      )}

      {/* Camera + confirmation overlay */}
      {!cameraErr ? (
        <div className="relative">
          <BarcodeScanner onScan={handleScan} onCameraError={setCameraErr} continuous />
          {pendingScan && (() => {
            const parsed = parseBarcode(pendingScan);
            return (
              <div className="absolute inset-x-0 bottom-0 rounded-b-2xl overflow-hidden"
                style={{ background: 'linear-gradient(to top, rgba(0,0,0,0.95) 60%, rgba(0,0,0,0.7) 100%)' }}>
                {/* Auto-confirm progress bar */}
                <div className="h-0.5 bg-emerald-500 opacity-60"
                  style={{ animation: `shrinkWidth ${SCAN_CONFIRM_MS}ms linear forwards` }} />
                <div className="px-4 pt-3 pb-4 space-y-2.5">
                  <p className="text-gray-400 text-xs text-center uppercase tracking-widest font-semibold">Scanned</p>
                  {parsed.serial && <p className="text-white text-sm font-mono text-center">S/N: <span className="text-emerald-400 font-bold">{parsed.serial}</span></p>}
                  {parsed.mac    && <p className="text-white text-sm font-mono text-center">MAC: <span className="text-emerald-400 font-bold">{parsed.mac}</span></p>}
                  {!parsed.serial && !parsed.mac && <p className="text-gray-300 text-xs font-mono text-center truncate">{pendingScan}</p>}
                  <div className="flex gap-2 pt-1">
                    <button onClick={dismissScan}
                      className="flex-1 py-2 rounded-xl text-sm font-semibold text-gray-300 border border-white border-opacity-20 bg-white bg-opacity-10">
                      ✕ Rescan
                    </button>
                    <button onClick={() => confirmScan(pendingScan)}
                      className="flex-1 py-2 rounded-xl text-sm font-semibold text-white bg-emerald-600">
                      ✓ Use this
                    </button>
                  </div>
                </div>
              </div>
            );
          })()}
        </div>
      ) : <ErrorBanner msg={cameraErr} />}

      {settings.demoMode && (
        <div className="grid grid-cols-1 gap-2">
          <Btn variant="secondary" onClick={() => handleScan('SN:EXIST9M5904X;MAC:AA:BB:CC:DD:EE:FF')}>
            🔄 Simulate Existing Device
          </Btn>
        </div>
      )}

      {/* Dynamic hint / last-scan feedback */}
      <div className={`flex items-center gap-2 rounded-xl px-3 py-2 text-xs transition-all ${
        lastScan
          ? 'bg-emerald-500 bg-opacity-10 border border-emerald-500 border-opacity-30 text-emerald-300'
          : 'bg-white bg-opacity-5 text-gray-500'
      }`}>
        <span>{lastScan ? '✓' : '↑'}</span>
        <span>{lastScan ? lastScan.label : hint}</span>
      </div>

      {/* Editable fields — populated by scanner, editable manually */}
      <Card className="space-y-4">
        <div className="space-y-1.5">
          <label className="text-xs font-semibold uppercase tracking-wider flex items-center gap-2"
            style={{ color: fields.serial ? '#10b981' : '#6b7280' }}>
            Serial Number {fields.serial && <span className="text-emerald-500 text-base leading-none">✓</span>}
          </label>
          <input value={fields.serial}
            onChange={e => setFields(p => ({ ...p, serial: e.target.value.toUpperCase() }))}
            placeholder="e.g. CP0001108"
            className="w-full bg-white bg-opacity-5 border border-white border-opacity-10 rounded-xl px-4 py-3.5 text-white placeholder-gray-700 focus:outline-none focus:border-emerald-500 text-sm font-mono transition-colors" />
        </div>
        <div className="space-y-1.5">
          <label className="text-xs font-semibold uppercase tracking-wider flex items-center gap-2"
            style={{ color: fields.mac ? '#10b981' : '#6b7280' }}>
            MAC Address {fields.mac && <span className="text-emerald-500 text-base leading-none">✓</span>}
          </label>
          <input value={fields.mac}
            onChange={e => setFields(p => ({ ...p, mac: e.target.value.toUpperCase() }))}
            placeholder="e.g. 00:0B:86:B8:64:18"
            className="w-full bg-white bg-opacity-5 border border-white border-opacity-10 rounded-xl px-4 py-3.5 text-white placeholder-gray-700 focus:outline-none focus:border-emerald-500 text-sm font-mono transition-colors" />
        </div>
      </Card>

      <Btn
        onClick={() => onScanned({ serial: fields.serial.trim(), mac: fields.mac.trim() || null }, null)}
        disabled={!canContinue}>
        Continue →
      </Btn>
    </div>
  );
};

// ── SCREEN: TAGS (optional) ───────────────────────────────────────────────────
const TagsScreen = ({ settings, api, onNext, initialTags }) => {
  const [existingTags, setExistingTags] = useState([]);
  const [loading, setLoading] = useState(true);
  const [selected, setSelected] = useState(initialTags && typeof initialTags === 'object' ? initialTags : {});  // key -> value
  const [customKey, setCustomKey] = useState('');
  const [customVal, setCustomVal] = useState('');

  useEffect(() => {
    api.glGetTags(settings)
      .then(tags => { setExistingTags(tags); setLoading(false); })
      .catch(() => setLoading(false));
  }, []);

  const toggleTag = (key, value) => {
    setSelected(p => {
      const n = { ...p };
      if (n[key] === value) delete n[key]; else n[key] = value;
      return n;
    });
  };

  const addCustom = () => {
    if (!customKey.trim()) return;
    setSelected(p => ({ ...p, [customKey.trim()]: customVal.trim() }));
    setCustomKey(''); setCustomVal('');
  };

  const selectedCount = Object.keys(selected).length;

  return (
    <div className="p-5 space-y-4 step-enter">
      <div className="pt-2">
        <h2 className="text-white font-bold text-xl">Tags <span className="text-gray-500 font-normal text-base">— optional</span></h2>
        <p className="text-gray-400 text-sm">Label this device for filtering and reporting</p>
      </div>

      {loading ? <Spinner /> : (
        <>
          {existingTags.length > 0 && (
            <div>
              <p className="text-gray-500 text-xs font-semibold uppercase tracking-wider mb-2">Existing workspace tags</p>
              <div className="flex flex-wrap gap-2">
                {existingTags.map(tag => {
                  const key = tag.key || tag.name;
                  const val = tag.value || '';
                  const isOn = selected[key] === val;
                  return (
                    <button key={key + val} onClick={() => toggleTag(key, val)}
                      className={`px-3 py-1.5 rounded-full text-xs font-medium border transition-all ${
                        isOn ? 'bg-emerald-500 bg-opacity-20 border-emerald-500 border-opacity-40 text-emerald-300'
                              : 'bg-white bg-opacity-5 border-white border-opacity-10 text-gray-400'
                      }`}>
                      {key}{val ? `: ${val}` : ''}
                    </button>
                  );
                })}
              </div>
            </div>
          )}

          <Card className="space-y-3">
            <p className="text-gray-500 text-xs font-semibold uppercase tracking-wider">Custom tag</p>
            <input value={customKey} onChange={e => setCustomKey(e.target.value)} placeholder="Key"
              className="w-full bg-white bg-opacity-5 border border-white border-opacity-10 rounded-xl px-3 py-2.5 text-white placeholder-gray-700 focus:outline-none focus:border-emerald-500 text-sm" />
            <div className="flex gap-2">
              <input value={customVal} onChange={e => setCustomVal(e.target.value)} placeholder="Value (optional)"
                className="flex-1 min-w-0 bg-white bg-opacity-5 border border-white border-opacity-10 rounded-xl px-3 py-2.5 text-white placeholder-gray-700 focus:outline-none focus:border-emerald-500 text-sm" />
              <button onClick={addCustom} disabled={!customKey.trim()}
                className="px-4 py-2.5 bg-emerald-500 bg-opacity-20 text-emerald-400 rounded-xl text-sm font-semibold disabled:opacity-30 shrink-0">+</button>
            </div>
          </Card>

          {selectedCount > 0 && (
            <Card>
              <p className="text-gray-500 text-xs font-semibold uppercase tracking-wider mb-2">Selected ({selectedCount})</p>
              <div className="flex flex-wrap gap-2">
                {Object.entries(selected).map(([k, v]) => (
                  <span key={k} onClick={() => setSelected(p => { const n={...p}; delete n[k]; return n; })}
                    className="px-3 py-1 bg-emerald-500 bg-opacity-15 border border-emerald-500 border-opacity-30 text-emerald-300 rounded-full text-xs cursor-pointer">
                    {k}{v ? `: ${v}` : ''} ×
                  </span>
                ))}
              </div>
            </Card>
          )}
        </>
      )}

      <div className="space-y-2.5 pt-1">
        <Btn onClick={() => onNext(selected)} disabled={selectedCount === 0 || loading}>
          {`Add ${selectedCount} Tag${selectedCount !== 1 ? 's' : ''} →`}
        </Btn>
        <Btn variant="secondary" onClick={() => onNext({})}>Skip for Now</Btn>
      </div>
    </div>
  );
};

  useEffect(() => {
    api.glGetLocations(settings)
      .then(locs => {
        setLocations(locs);
        if (initialId) {

const userName = u => {
  const fn = u.profile?.firstName || u.firstName || '';
  const ln = u.profile?.lastName  || u.lastName  || '';
  return (fn + ' ' + ln).trim() || u.displayName || u.email || u.username || u.id;
};
const userEmail = u => u.email || u.username || u.profile?.email || '';

const ContactScreen = ({ settings, api, onSelect, onSkip, initialId }) => {
  const [users, setUsers]       = useState([]);
  const [loading, setLoading]   = useState(true);
  const [selected, setSelected] = useState(null);
  const [mode, setMode]         = useState('list');

  useEffect(() => {
    api.glGetUsers(settings)
      .then(u => {
        setUsers(u);
        if (initialId) {
          const match = u.find(user => String(user.id) === String(initialId));

        }
        setLoading(false);
      })

    const q = search.toLowerCase();
    return userName(u).toLowerCase().includes(q) || (u.email || '').toLowerCase().includes(q);

  const handleCreate = async () => {
    if (!newUser.email.trim()) return;

      const user = await api.glInviteUser({ ...newUser, ...settings });
      setUsers(p => [user, ...p]);
      setSelected(user);
      setMode('list');

  return (
    <div className="p-5 space-y-4 step-enter">

        <p className="text-gray-400 text-sm">Delivery or service contact for this device</p>
      </div>

      <div className="flex bg-white bg-opacity-5 rounded-xl p-1 gap-1">
        {[['list','👤  Pick Existing'],['create','➕  Add New']].map(([m, lbl]) => (
          <button key={m} onClick={() => setMode(m)}

                    : 'bg-white bg-opacity-5 border-white border-opacity-10'}`}>
                  <p className="text-white font-medium text-sm">{userName(user)}</p>
                  {userEmail(user) && <p className="text-gray-500 text-xs mt-0.5">{userEmail(user)}</p>}
                  {selected?.id === user.id && <p className="text-emerald-400 text-xs mt-1">✓ Selected</p>}

              ))}
            </div>
          )}
        </>
      ) : (
        <Card className="space-y-3">
          <div className="grid grid-cols-2 gap-3">
            <TextInput label="First Name" value={newUser.firstName} onChange={setNU('firstName')} placeholder="Alice" />
            <TextInput label="Last Name"  value={newUser.lastName}  onChange={setNU('lastName')}  placeholder="Smith" />
          </div>
          <TextInput label="Email" value={newUser.email} onChange={setNU('email')} placeholder="alice@example.com" />

          <Btn onClick={handleCreate} disabled={!newUser.email.trim() || creating}>
            {creating ? 'Adding…' : 'Add Contact'}
          </Btn>
        </Card>
      )}

      <div className="space-y-2.5 pt-1">
        <Btn onClick={() => onSelect(selected)} disabled={!selected}>
          {selected ? `Assign ${userName(selected)} →` : 'Select a Contact →'}
        </Btn>
        <Btn variant="secondary" onClick={onSkip}>Skip for Now</Btn>
      </div>
    </div>
  );
};

// ── SCREEN: ADDING TO GREENLAKE (with async polling UI) ───────────────────────
const AddingScreen = ({ device, settings, api, onSuccess, onBack }) => {
  const [status, setStatus] = useState('loading');
  const [msg, setMsg] = useState('Registering device in HPE GreenLake…');
  const [subMsg, setSubMsg] = useState('This may take up to 30 seconds');

  useEffect(() => {
    const go = async () => {
      try {
        setMsg('Sending device to GreenLake…');
        setSubMsg('Waiting for async confirmation…');
        const result = await api.glAddDevice({
          serial: device.serial, mac: device.mac,
          tags: device.tags,
          locationId: device.location?.id,
          ...settings,
        });
        setStatus('success');
        setMsg(result.foundExisting ? 'Device found in GreenLake!' : 'Device registered!');
        setSubMsg(result.foundExisting ? 'Already registered — updating attributes only' : '');
        setTimeout(() => onSuccess(result), 900);
      } catch (err) {
        setStatus('error');
        setMsg(err.message);
        setSubMsg('');
      }
    };
    go();
  }, []);

  return (
    <div className="p-5 step-enter">
      <div className="pt-2 mb-8">
        <h2 className="text-white font-bold text-xl">Adding to GreenLake</h2>
        <p className="text-gray-400 text-sm font-mono">{device.serial}</p>
      </div>
      <div className="flex flex-col items-center py-10 space-y-5 text-center">
        {status === 'loading' && (
          <>
            <Spinner size={48} />
            <div>
              <p className="text-gray-300 text-sm font-medium">{msg}</p>
              {subMsg && <p className="text-gray-600 text-xs mt-1">{subMsg}</p>}
            </div>
          </>
        )}
        {status === 'success' && (
          <div className="w-20 h-20 bg-emerald-500 bg-opacity-20 rounded-full flex items-center justify-center text-4xl">✓</div>
        )}
        {status === 'error' && (
          <div className="w-full space-y-5">

const ReviewScreen = ({ summary, settings, api, onDone, onBack }) => {
  const isUxi = summary.deviceType === 'UXI';
  const [submitting, setSubmitting] = useState(false);
  const [stepStatus, setStepStatus] = useState({
    subscription: summary.subscription ? 'pending' : 'skipped',
    application: 'pending',
    site: isUxi ? 'skipped' : 'pending',
    function: (isUxi || !summary.deviceFunction) ? 'skipped' : 'pending',
    hostname: (isUxi || !summary.hostname) ? 'skipped' : 'pending',
  });
  const [errorMsg, setErrorMsg] = useState('');
  const set = (k, v) => setStepStatus(p => ({ ...p, [k]: v }));

  const centralUrl = CLUSTERS.find(c => c.id === settings.centralCluster)?.url || CLUSTERS[0].url;

  const handleProvision = async () => {
    setSubmitting(true); setErrorMsg('');
    // Helper: run an assignment step; treat GreenLake 500s as soft failures
    // (device likely already assigned from a prior run — not a fatal error).
    const assignStep = async (key, fn) => {
      console.log(`[provision] starting step: ${key}`);
      set(key, 'loading');
      try {
        await fn();
        console.log(`[provision] step succeeded: ${key}`);
        set(key, 'success');
      } catch (err) {
        const isServerErr = err.errorCode === 'HPE_GL_ERROR_INTERNAL_SERVER_ERROR'
          || (err.message || '').toLowerCase().includes('internal server error');
        if (isServerErr) {
          // 500 almost always means the item is already assigned — silently skip
          set(key, 'skipped');
        } else {
          throw err;
        }
      }
    };

    try {
      if (summary.subscription) {
        await assignStep('subscription', () =>
          api.glAssignSubscription({ deviceId: summary.deviceId, subscriptionId: summary.subscription.id, ...settings })
        );
      }
      await assignStep('application', () =>
        api.glAssignApplication({ deviceId: summary.deviceId, applicationId: summary.application.id, region: summary.applicationRegion, ...settings })
      );
      if (!isUxi) {
        // Site assignment API not available on any cluster — skip silently.
        // The site dropdown is kept in the UI for reference but no API call is made.
        set('site', 'skipped');
        if (summary.deviceFunction) {
          set('function', 'loading');
          try {
            await api.centralAssignFunction({ deviceId: summary.deviceId, serial: summary.serial, persona: summary.deviceFunction.id, ...settings, centralUrl });
            set('function', 'success');
          } catch (fnErr) {
            if (fnErr.softFail) {
              set('function', 'skipped');
              setErrorMsg(prev => [prev, fnErr.message].filter(Boolean).join('\n'));
            } else {
              throw fnErr;
            }
          }
        }
        if (summary.hostname) {
          set('hostname', 'loading');
          try {
            await api.centralSetHostname({ serial: summary.serial, hostname: summary.hostname, scopeId: summary.hostnameScopeId, ...settings, centralUrl });
            set('hostname', 'success');
          } catch (hnErr) {
            set('hostname', 'skipped');
            setErrorMsg(prev => [prev, 'Hostname could not be set — assign manually in Aruba Central'].filter(Boolean).join('\n'));
          }
        }
      }
      setTimeout(onDone, 600);
    } catch (err) {
      setStepStatus(p => {
        const n = { ...p };
        Object.keys(n).forEach(k => { if (n[k] === 'loading') n[k] = 'error'; });
        return n;
      });
      setErrorMsg(err.message);
      setSubmitting(false);
    }
  };

  const rows = [
    { label: 'Serial',       value: summary.serial,                         mono: true },
    { label: 'MAC',          value: summary.mac,                            mono: true },
    { label: 'Tags',         value: Object.keys(summary.tags || {}).length > 0 ? `${Object.keys(summary.tags).length} tag(s)` : 'None' },
    { label: 'Location',     value: summary.location?.name || 'None' },
    { label: 'Contact',      value: summary.contact ? `${userName(summary.contact)}${summary.contact.email ? ` — ${summary.contact.email}` : ''}` : 'None' },
    { label: 'Subscription', value: summary.subscription?.skuDescription || 'Skip', step: 'subscription' },
    { label: 'Service',      value: summary.application?.name,              step: 'application' },
    { label: 'Region',       value: summary.application?.regionName || regionLabel(summary.applicationRegion) },
    { label: 'Site',         value: summary.site?.name,                     step: 'site' },
    { label: 'Function',     value: summary.deviceFunction?.label,          step: 'function' },
    { label: 'Hostname',     value: summary.hostname,                       step: 'hostname' },
  ];

  return (
    <div className="p-5 space-y-5 step-enter">
      <div className="pt-2">
        <h2 className="text-white font-bold text-xl">Review & Confirm</h2>
        <p className="text-gray-400 text-sm">Everything looks good? Let's provision.</p>
      </div>
      <Card className="space-y-0 divide-y divide-white divide-opacity-5">
        {rows.map(row => (
          <div key={row.label} className="flex items-center justify-between py-3 gap-3">
            <span className="text-gray-400 text-sm shrink-0">{row.label}</span>
            <div className="flex items-center gap-2 min-w-0">
              {row.step && submitting && <Badge status={stepStatus[row.step]} />}
              <span className={`text-white text-sm ${row.mono ? 'font-mono' : 'font-medium'} truncate`}>{row.value || '—'}</span>
            </div>
          </div>
        ))}
      </Card>
      {errorMsg && <ErrorBanner msg={errorMsg} />}
      {!submitting ? (
        <div className="space-y-2.5">
          <Btn onClick={handleProvision}>🚀 Provision Device</Btn>
        </div>
      ) : (
        <div className="bg-white bg-opacity-5 rounded-2xl p-4 text-center space-y-2">
          <Spinner size={28} />
          <p className="text-gray-400 text-sm">Provisioning… please wait</p>
          <p className="text-gray-600 text-xs">Async operations can take up to 30s each</p>
        </div>
      )}
    </div>
  );
};

const STEPS = ['scan','tags','location','contact','adding_gl','device_type','subscription','application','site','function','review'];

const STEP_PROGRESS = { scan:0, tags:1, location:2, contact:3, adding_gl:4, device_type:5, subscription:5, application:6, site:7, function:8, hostname:9, review:10 };
const TOTAL_STEPS = 10;

const defaultSettings = () => ({

  centralCluster: 'eu1',
