                {selected?.id === app.id && (
                  <span className="text-emerald-400 text-xs shrink-0">
                    {initialId && initialId === app.id ? '✓ Currently assigned' : '✓ Selected'}
                  </span>
                )}
              </div>
            </button>
          ))}
        </div>
      )}

      <Btn onClick={() => selected && onSelect(selected)} disabled={!selected || loading}>
        Continue →
      </Btn>
    </div>
  );
};

// ── SCREEN: SITE ──────────────────────────────────────────────────────────────
const SiteScreen = ({ settings, api, onSelect, onSkip, initialId }) => {
  const [sites, setSites] = useState([]);
  const [loading, setLoading] = useState(true);
  const [selected, setSelected] = useState(null);
  const [search, setSearch] = useState('');
  const [error, setError] = useState('');

  useEffect(() => {
    api.centralGetSites(settings)
      .then(d => {
        // Currently assigned site sorts first
        if (initialId) d.sort((a, b) => {
          if (String(a.id) === String(initialId)) return -1;
          if (String(b.id) === String(initialId)) return 1;
          return 0;
        });
        setSites(d);
        if (initialId) {
          const match = d.find(s => String(s.id) === String(initialId));
          if (match) setSelected(match);
        }
        setLoading(false);
      })
      .catch(e => { setError(e.message); setLoading(false); });
  }, []);

  // Reactive pre-population: fires when initialId arrives late (background Central lookup)
  useEffect(() => {
    if (initialId && sites.length > 0) {
      const match = sites.find(s => String(s.id) === String(initialId));
      if (match) setSelected(match);
    }
  }, [initialId, sites]);

  const filtered = sites.filter(s =>
    (s.name || '').toLowerCase().includes(search.toLowerCase()) ||
    (s.city || '').toLowerCase().includes(search.toLowerCase())
  );

  return (
    <div className="p-5 space-y-4 step-enter">
      <div className="pt-2">
        <h2 className="text-white font-bold text-xl">Assign Site</h2>
        <p className="text-gray-400 text-sm">Where is this device being installed?</p>
      </div>
      <div className="flex items-start gap-2 bg-amber-500 bg-opacity-10 border border-amber-500 border-opacity-30 rounded-xl px-4 py-3">
        <span className="text-amber-400 text-sm shrink-0">⚠</span>
        <p className="text-amber-300 text-xs leading-relaxed">Site assignment in New Central is coming soon. Select a site for reference — Please assign manually in Aruba Central Classic.</p>
      </div>
      <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search sites…"
        className="w-full bg-white bg-opacity-5 border border-white border-opacity-10 rounded-xl px-4 py-3 text-white placeholder-gray-600 focus:outline-none focus:border-emerald-500 text-sm" />
      {loading && <Spinner />}
      {error && <ErrorBanner msg={error} />}
      <div className="space-y-2 max-h-72 overflow-y-auto pr-1">
        {!loading && filtered.map(site => (
          <button key={site.id} onClick={() => setSelected(site)}
            className={`w-full text-left p-4 rounded-2xl border transition-all ${
              selected?.id === site.id ? 'bg-emerald-500 bg-opacity-10 border-emerald-500 border-opacity-40'
              : 'bg-white bg-opacity-5 border-white border-opacity-10'}`}>
            <p className="text-white font-medium text-sm">{site.name}</p>
            {(site.city || site.state) && <p className="text-gray-500 text-xs mt-0.5">{[site.city, site.state].filter(Boolean).join(', ')}</p>}
            {selected?.id === site.id && <p className="text-emerald-400 text-xs mt-1.5">{initialId && String(initialId) === String(site.id) ? '✓ Currently assigned' : '✓ Selected'}</p>}
          </button>
        ))}
      </div>
      <div className="space-y-2.5 pt-1">
        <Btn onClick={() => onSelect(selected)} disabled={!selected}>
          {selected ? `Use "${selected.name}" →` : 'Select a Site →'}
        </Btn>
        <Btn variant="secondary" onClick={() => onSkip()}>Skip for Now</Btn>
      </div>
    </div>
  );
};

// ── SCREEN: DEVICE FUNCTION ───────────────────────────────────────────────────
const FunctionScreen = ({ onSelect, onSkip, deviceType, initialId }) => {

    .sort((a, b) => {

    const centralUrl = CLUSTERS.find(c => c.id === (settings.centralCluster || 'eu1'))?.url || CLUSTERS[0].url;
    api.centralGetDeviceStats({
      serial: summary.serial,
      deviceType: summary.deviceType,

    const h = Math.floor((secs % 86400) / 3600);
    const m = Math.floor((secs % 3600) / 60);
    return [d && `${d}d`, h && `${h}h`, m && `${m}m`].filter(Boolean).join(' ') || '<1m';
  };

  return (
    <div className="flex flex-col" style={{ height: 'calc(100dvh - 120px)' }}>

                  <p className="text-gray-500 mb-0.5">Status</p>

                  <p className="text-gray-500 mb-0.5">Clients</p>

                {stats.ip_address && (

          style={{ background: 'rgba(16,185,129,0.12)', border: '1px solid rgba(16,185,129,0.3)', color: '#6ee7b7' }}>

// ── SCREEN: HOSTNAME (optional) ───────────────────────────────────────────────
const HostnameScreen = ({ settings, api, deviceType, serial, onNext, onSkip }) => {
  const [hostname, setHostname] = useState('');
  const [currentHostname, setCurrentHostname] = useState(null);
  const [hostnameExists, setHostnameExists] = useState(false);
  const [scopeId, setScopeId] = useState(null);
  const [persona, setPersona] = useState('CAMPUS_AP');
  const [loading, setLoading] = useState(true);

  const isCxSwitch = deviceType === 'SWITCH_CX' || deviceType === 'SWITCH';
  const maxLen = isCxSwitch ? 32 : 128;
  const centralUrl = CLUSTERS.find(c => c.id === settings.centralCluster)?.url || CLUSTERS[0].url;

  useEffect(() => {
    api.centralGetSystemInfo({ serial, deviceType, ...settings, centralUrl })
      .then(d => {
        if (d?._scopeId) setScopeId(d._scopeId);
        if (d?._persona) setPersona(d._persona);
        if (d?.deviceName) {
          // MAC address (e.g. 3c:e8:6e:c0:77:1d) means no real hostname is configured —
          // Central uses the MAC as a fallback display name when the system-info record
          // doesn't exist. Show it as current but don't treat it as an existing hostname.
          const isMac = /^([0-9a-fA-F]{2}:){5}[0-9a-fA-F]{2}$/i.test(d.deviceName);
          setCurrentHostname(d.deviceName);
          setHostname(d.deviceName);
          setHostnameExists(!isMac);
        }
        setLoading(false);
      })
      .catch(() => setLoading(false));
  }, []);

  const validationError = (() => {
    if (!hostname) return '';
    if (!/^[a-zA-Z0-9:-]+$/.test(hostname)) return 'Only letters, numbers, dashes, and colons allowed';
    if (hostname.length > maxLen) return `Max ${maxLen} characters for ${isCxSwitch ? 'CX switches' : 'this device'}`;
    return '';
  })();

  const canSubmit = hostname.trim().length > 0 && !validationError;

  return (
    <div className="p-5 space-y-4 step-enter">
      <div className="pt-2">
        <h2 className="text-white font-bold text-xl">Hostname <span className="text-gray-500 font-normal text-base">— optional</span></h2>
        <p className="text-gray-400 text-sm">Set a name for this device in Aruba Central</p>
      </div>

      <div className="flex items-start gap-3 bg-amber-500 bg-opacity-10 border border-amber-500 border-opacity-30 rounded-2xl px-4 py-3">
        <span className="text-amber-400 text-lg shrink-0">⚠️</span>
        <p className="text-amber-300 text-xs leading-relaxed">Hostname assignment requires the device to already be provisioned in New Central with a site assigned. If this device was just added, set the hostname manually in Aruba Central for now — full API support is coming soon.</p>
      </div>

      {loading ? <Spinner /> : (
        <>
          {currentHostname && (
            <div className="flex items-center gap-2 px-1">
              <p className="text-gray-500 text-xs font-semibold uppercase tracking-wider shrink-0">Current</p>
              <p className="text-gray-400 text-sm font-mono truncate">{currentHostname}</p>
            </div>
          )}
          <div className="space-y-1.5">
            <p className="text-gray-500 text-xs font-semibold uppercase tracking-wider px-1">
              {currentHostname ? 'New Hostname' : 'Set Hostname'}
            </p>
            <input
              value={hostname}
              onChange={e => setHostname(e.target.value)}
              placeholder="e.g. AP-lobby-floor2"
              maxLength={maxLen}
              autoCapitalize="none"
              autoCorrect="off"
              className="w-full bg-white bg-opacity-5 border border-white border-opacity-10 rounded-xl px-4 py-3 text-white placeholder-gray-600 focus:outline-none focus:border-emerald-500 text-sm font-mono"
            />
            <div className="flex justify-between items-center px-1">
              {validationError
                ? <p className="text-red-400 text-xs">{validationError}</p>
                : <p className="text-gray-600 text-xs">Letters, numbers, dashes, and colons</p>
              }
              {isCxSwitch && (
                <p className={`text-xs shrink-0 ${hostname.length > maxLen * 0.85 ? 'text-amber-400' : 'text-gray-600'}`}>
                  {hostname.length}/{maxLen}
                </p>
              )}
            </div>
          </div>
        </>
      )}

      <div className="space-y-2.5 pt-1">
        <Btn onClick={() => canSubmit && onNext({ hostname: hostname.trim(), hostnameExists, scopeId, persona })} disabled={!canSubmit || loading}>
          {currentHostname ? 'Update Hostname →' : 'Set Hostname →'}
        </Btn>
        <Btn variant="secondary" onClick={onSkip}>Skip for Now</Btn>
      </div>
    </div>
  );
};

const ReviewScreen = ({ summary, settings, api, onDone, onBack }) => {
  const isUxi = summary.deviceType === 'UXI';
  const [submitting, setSubmitting] = useState(false);
  // Compute tag patch: additions/changes from summary.tags PLUS null-deletions for any
  // tags that were on the device (currentTags) but the user removed during this session.
  const tagPatch = { ...(summary.tags || {}) };
  Object.keys(summary.currentTags || {}).forEach(k => {
    if (tagPatch[k] === undefined) tagPatch[k] = null; // null = delete on v2beta1 PATCH
  });
  const hasTags = Object.keys(tagPatch).length > 0;
  const hasContact = !!summary.contact;
  const [stepStatus, setStepStatus] = useState({
    attributes: (hasTags || hasContact) ? 'pending' : 'skipped',
    subscription: summary.subscription ? 'pending' : 'skipped',
    application: 'pending',
    site: isUxi ? 'skipped' : 'pending',
    function: (isUxi || !summary.deviceFunction) ? 'skipped' : 'pending',
    hostname: (isUxi || !summary.hostname) ? 'skipped' : 'pending',
  });
  const [errorMsg, setErrorMsg] = useState('');
  const set = (k, v) => setStepStatus(p => ({ ...p, [k]: v }));

  const centralUrl = CLUSTERS.find(c => c.id === settings.centralCluster)?.url || CLUSTERS[0].url;

  const handleProvision = async () => {
    setSubmitting(true); setErrorMsg('');
    // Helper: run an assignment step; treat GreenLake 500s as soft failures
    // (device likely already assigned from a prior run — not a fatal error).
    const assignStep = async (key, fn) => {
      console.log(`[provision] starting step: ${key}`);
      set(key, 'loading');
      try {
        await fn();
        console.log(`[provision] step succeeded: ${key}`);
        set(key, 'success');
      } catch (err) {
        const isServerErr = err.errorCode === 'HPE_GL_ERROR_INTERNAL_SERVER_ERROR'
          || (err.message || '').toLowerCase().includes('internal server error');
        if (isServerErr) {
          // 500 almost always means the item is already assigned — silently skip
          set(key, 'skipped');
        } else {
          throw err;
        }
      }
    };

    try {
      // Apply tags + contact via a single PATCH — always run if either is set
      if (hasTags || hasContact) {
        await assignStep('attributes', () =>
          api.glPatchAttributes({ deviceId: summary.deviceId, tags: tagPatch, contact: summary.contact, ...settings })
        );
      }

      if (summary.subscription) {
        // Skip subscription assignment if the same subscription is already on this device
        const sameSubscription = summary.foundExisting && summary.currentSubscriptionKey
          && summary.subscription.key === summary.currentSubscriptionKey;
        if (sameSubscription) {
          console.log('[provision] subscription unchanged — skipping GL assign');
          set('subscription', 'skipped');
        } else {
          await assignStep('subscription', () =>
            api.glAssignSubscription({ deviceId: summary.deviceId, subscriptionId: summary.subscription.id, ...settings })
          );
        }
      }
      // Skip application assignment if the same application is already assigned
      const sameApplication = summary.foundExisting && summary.currentApplicationId
        && summary.application?.id === summary.currentApplicationId;
      if (sameApplication) {
        console.log('[provision] application unchanged — skipping GL assign');
        set('application', 'skipped');
      } else {
        await assignStep('application', () =>
          api.glAssignApplication({ deviceId: summary.deviceId, applicationId: summary.application.id, region: summary.applicationRegion, ...settings })
        );
      }
      if (!isUxi) {
        // Site assignment API not available on any cluster — skip silently.
        // The site dropdown is kept in the UI for reference but no API call is made.
        set('site', 'skipped');
        if (summary.deviceFunction) {
          set('function', 'loading');
          try {
            await api.centralAssignFunction({ deviceId: summary.deviceId, serial: summary.serial, persona: summary.deviceFunction.id, ...settings, centralUrl });
            set('function', 'success');
          } catch (fnErr) {
            if (fnErr.softFail) {
              set('function', 'skipped');
              setErrorMsg(prev => [prev, fnErr.message].filter(Boolean).join('\n'));
            } else {
              throw fnErr;
            }
          }
        }
        if (summary.hostname) {
          set('hostname', 'loading');
          try {
            await api.centralSetHostname({ serial: summary.serial, hostname: summary.hostname, hostnameExists: summary.hostnameExists, scopeId: summary.hostnameScopeId, persona: summary.hostnamePersona || 'CAMPUS_AP', deviceType: summary.deviceType, ...settings, centralUrl });
            set('hostname', 'success');
          } catch (hnErr) {
            set('hostname', 'skipped');
            setErrorMsg(prev => [prev, 'Hostname could not be set — assign manually in Aruba Central'].filter(Boolean).join('\n'));
          }
        }
      }
      setTimeout(onDone, 600);
    } catch (err) {
      setStepStatus(p => {
        const n = { ...p };
        Object.keys(n).forEach(k => { if (n[k] === 'loading') n[k] = 'error'; });
        return n;
      });
      setErrorMsg(parseApiError(err.message));
      setSubmitting(false);
    }
  };

  const rows = [
    { label: 'Serial',       value: summary.serial,                         mono: true },
    { label: 'MAC',          value: summary.mac,                            mono: true },
    { label: 'Tags',         value: (() => { const adds = Object.values(tagPatch).filter(v => v !== null).length; const dels = Object.values(tagPatch).filter(v => v === null).length; return adds > 0 || dels > 0 ? `${adds} tag${adds !== 1 ? 's' : ''}${dels > 0 ? ` (−${dels} removed)` : ''}` : 'None'; })(), step: (hasTags || hasContact) ? 'attributes' : null },
    { label: 'Location',     value: summary.location?.name || 'None' },
    { label: 'Contact',      value: summary.contact ? `${userName(summary.contact)}${summary.contact.email ? ` — ${summary.contact.email}` : ''}` : 'None', step: (hasTags || hasContact) ? 'attributes' : null },
    { label: 'Subscription', value: summary.subscription?.skuDescription || 'Skip', step: 'subscription' },
    { label: 'Service',      value: summary.application?.name,              step: 'application' },
    { label: 'Region',       value: summary.application?.regionName || regionLabel(summary.applicationRegion) },
    { label: 'Site',         value: summary.site?.name,                     step: 'site' },
    { label: 'Function',     value: summary.deviceFunction?.label,          step: 'function' },
    { label: 'Hostname',     value: summary.hostname,                       step: 'hostname' },
  ];

  return (
    <div className="p-5 space-y-5 step-enter">
      <div className="pt-2">
        <h2 className="text-white font-bold text-xl">Review & Confirm</h2>
        <p className="text-gray-400 text-sm">{summary.foundExisting ? 'Device already in GreenLake — updating assignments.' : "Everything looks good? Let's provision."}</p>
      </div>
      {summary.foundExisting && (
        <div className="flex items-start gap-3 bg-amber-500 bg-opacity-10 border border-amber-500 border-opacity-30 rounded-2xl px-4 py-3">
          <span className="text-amber-400 text-lg shrink-0">⚠️</span>
          <p className="text-amber-300 text-sm">This device is already in GreenLake. Only changes you made on the previous screens will be applied.</p>
        </div>
      )}
      <Card className="space-y-0 divide-y divide-white divide-opacity-5">
        {rows.map(row => (
          <div key={row.label} className="flex items-center justify-between py-3 gap-3">
            <span className="text-gray-400 text-sm shrink-0">{row.label}</span>
            <div className="flex items-center gap-2 min-w-0">
              {row.step && submitting && <Badge status={stepStatus[row.step]} />}
              <span className={`text-white text-sm ${row.mono ? 'font-mono' : 'font-medium'} truncate`}>{row.value || '—'}</span>
            </div>
          </div>
        ))}
      </Card>
      {errorMsg && <ErrorBanner msg={errorMsg} />}
      {!submitting ? (
        <div className="space-y-2.5">
          <Btn onClick={handleProvision}>🚀 Provision Device</Btn>
        </div>
      ) : (
        <div className="bg-white bg-opacity-5 rounded-2xl p-4 text-center space-y-2">
          <Spinner size={28} />
          <p className="text-gray-400 text-sm">Provisioning… please wait</p>
          <p className="text-gray-600 text-xs">Async operations can take up to 30s each</p>
        </div>
      )}
    </div>
  );
};

// ── SCREEN: SUCCESS ───────────────────────────────────────────────────────────

// ── BATCH HELPERS ─────────────────────────────────────────────────────────────

// Generates a hostname from a pattern for a specific device + index.
// Supported tokens: {N} {N:02} {N:03} {SERIAL} {MODEL} {PART}
function generateHostname(pattern, device, idx) {
  return pattern
    .replace(/\{N:(\d+)\}/g, (_, pad) => String(idx).padStart(parseInt(pad, 10), '0'))
    .replace(/\{N\}/g, String(idx))
    .replace(/\{SERIAL\}/g, device.serial || '')
    .replace(/\{MODEL\}/g, (device.deviceModel || '').replace(/\s+/g, '-'))
    .replace(/\{PART\}/g, device.partNumber || '');
}

// Groups queue results (after GL add) by part number (J-number).
// Devices with no part number get their own single-device group keyed by serial.
function computeBatchGroups(results) {
  const successItems = results.filter(r => r.status === 'success');
  const groupMap = {};
  for (const item of successItems) {
    const key = item.partNumber || `_ungrouped_${item.serial}`;
    if (!groupMap[key]) {
      groupMap[key] = {
        key,
        partNumber: item.partNumber,
        deviceType: item.deviceType,
        label: item.deviceModel
          ? `${item.deviceModel}${item.partNumber ? ` (${item.partNumber})` : ''}`
          : (item.partNumber || item.deviceType || 'Unknown device'),
        deviceSerials: [],
        subscription: null,
        deviceFunction: null,
        currentSubscriptionKey: item.currentSubscriptionKey || null,
        currentFunctionId: item.currentFunctionId || null,
      };
    }
    groupMap[key].deviceSerials.push(item.serial);
  }
  return Object.values(groupMap);
}

// ── SCREEN: BATCH SCAN ────────────────────────────────────────────────────────
// Layout 1: camera top ~55%, status line, scrollable queue list below
const BatchScanScreen = ({ settings, api, onDone, onBack, onOpenSettings }) => {
  const [queue, setQueue]           = useState([]);
  const [current, setCurrent]       = useState({ serial: '', mac: '' });
  const [pendingScan, setPendingScan] = useState(null);
  const [cameraErr, setCameraErr]   = useState('');
  const [manualOpen, setManualOpen] = useState(false);
  const [manualSerial, setManualSerial] = useState('');
  const [manualMac, setManualMac]   = useState('');
  const confirmTimer  = useRef(null);
  const demoIdxRef    = useRef(0);  // increments so each demo scan gets a unique serial

  // Core helper: add a device to the queue and kick off background lookup
  const addItemToQueue = useCallback((serial, mac) => {
    const id = `${serial}_${Date.now()}`;
    const newItem = {
      _id: id, serial, mac: mac || null,
      lookupStatus: 'loading', isExisting: false,
      glDeviceId: null, deviceType: null, deviceModel: null, partNumber: null,
      currentSubscriptionKey: null, currentApplicationId: null,
      currentLocationId: null, currentContactId: null,
      currentSiteId: null, currentFunctionId: null, currentTags: {},
    };
    setQueue(q => [...q, newItem]);
    const centralUrl = CLUSTERS.find(c => c.id === (settings.centralCluster || 'eu1'))?.url || CLUSTERS[0].url;
    Promise.all([
      api.glLookupDevice({ serial, ...settings }),
      api.centralGetDeviceSiteId({ serial, centralToken: settings.centralToken || settings.token, centralUrl }),
    ]).then(([glResult, centralInfo]) => {
      const glData = glResult || {};
      const glType = (glData.deviceType || '').toUpperCase();
      const mapped = GL_DEVICE_TYPE_MAP[glType] || null;
      const { siteId, persona } = centralInfo || {};
      setQueue(q => q.map(qi => qi._id !== id ? qi : {
        ...qi,
        lookupStatus: 'done',
        isExisting: !!glData.id,
        glDeviceId: glData.id || null,
        deviceType: mapped,
        deviceModel: glData.model || glData.deviceModel || null,
        partNumber: glData.partNumber || null,
        currentSubscriptionKey: glData._subKey || null,
        currentApplicationId: glData.application?.id || null,
        currentLocationId: glData.location?.id || null,
        currentContactId: glData.contact?.workspaceUser?.id || glData.contact?.id || null,
        currentTags: glData.tags || {},
        currentSiteId: siteId || null,
        currentFunctionId: (persona && persona !== 'None') ? persona : null,
      }));
    }).catch(() => setQueue(q => q.map(qi => qi._id !== id ? qi : { ...qi, lookupStatus: 'done' })));
  }, [settings, api]);

  // Helper used by demo buttons: parse a raw barcode string then add
  const addDemoDevice = useCallback(raw => {
    const result = parseBarcode(raw);
    if (!result.serial) return;
    addItemToQueue(result.serial, result.mac);
  }, [addItemToQueue]);

  // Auto-add when both serial + MAC are present (scanner path)
  useEffect(() => {
    if (!current.serial || !current.mac) return;
    const serial = current.serial;
    const mac    = current.mac;
    setCurrent({ serial: '', mac: '' });
    addItemToQueue(serial, mac);
  }, [current.serial, current.mac]);

  const processScan = useCallback(raw => {
    const result = parseBarcode(raw);
    if (!result.serial && !result.mac) return;
    setCurrent(prev => ({
      serial: result.serial || prev.serial,
      mac:    result.mac    || prev.mac,
    }));
  }, []);

  const handleScan = useCallback(raw => {
    const result = parseBarcode(raw);
    if (!result.serial && !result.mac) return;
    if (settings.scanConfirm ?? true) {
      clearTimeout(confirmTimer.current);
      setPendingScan(raw);
      confirmTimer.current = setTimeout(() => { setPendingScan(null); processScan(raw); }, SCAN_CONFIRM_MS);
    } else {
      processScan(raw);
    }
  }, [settings.scanConfirm, processScan]);

  const hint = !current.serial && !current.mac
    ? 'Scan one barcode at a time — S/N or MAC, either order'
    : !current.serial ? 'MAC captured — now scan the Serial Number barcode'
    : !current.mac    ? `Serial captured — now scan the MAC barcode`
    : 'Both captured — adding to queue…';

  const removeItem = id => setQueue(q => q.filter(qi => qi._id !== id));

  return (
    <div className="flex flex-col" style={{ height: 'calc(100dvh - 120px)' }}>
      {/* Title */}
      <div className="px-5 pt-2 pb-2 flex items-center justify-between shrink-0">
        <div>
          <h2 className="text-white font-bold text-xl">Scan Device</h2>
          <p className="text-gray-400 text-sm">Scan S/N + MAC for each device</p>
        </div>
        <div className="flex items-center gap-2">
          {onOpenSettings && (
            <button onClick={onOpenSettings}
              className="w-9 h-9 bg-white bg-opacity-10 rounded-xl flex items-center justify-center text-base">⚙️</button>
          )}
        </div>
      </div>

      {/* Demo mode banner */}
      {settings.demoMode && (
        <div className="mx-5 mb-2 flex items-center gap-2 bg-yellow-500 bg-opacity-10 border border-yellow-500 border-opacity-25 rounded-xl px-3 py-2.5 shrink-0">
          <span className="text-yellow-400 text-xs font-semibold">🧪 Demo Mode — no real API calls</span>
        </div>
      )}

      {/* Camera — fixed height container, overflow-hidden clips library's oversized video */}
      <div className="px-5 shrink-0" style={{ height: '38dvh', minHeight: 200, maxHeight: 300 }}>
        {!cameraErr
          ? <div className="relative h-full">
              <BarcodeScanner onScan={handleScan} onCameraError={setCameraErr} continuous />
              {pendingScan && (() => {
                const parsed = parseBarcode(pendingScan);
                return (
                  <div className="absolute inset-x-0 bottom-0 rounded-b-2xl overflow-hidden"
                    style={{ background: 'linear-gradient(to top, rgba(0,0,0,0.95) 60%, rgba(0,0,0,0.7) 100%)' }}>
                    <div className="h-0.5 bg-emerald-500 opacity-60"
                      style={{ animation: `shrinkWidth ${SCAN_CONFIRM_MS}ms linear forwards` }} />
                    <div className="px-4 pt-3 pb-3 space-y-2">
                      {parsed.serial && <p className="text-white text-sm font-mono text-center">S/N: <span className="text-emerald-400 font-bold">{parsed.serial}</span></p>}
                      {parsed.mac    && <p className="text-white text-sm font-mono text-center">MAC: <span className="text-emerald-400 font-bold">{parsed.mac}</span></p>}
                      <div className="flex gap-2">
                        <button onClick={() => { clearTimeout(confirmTimer.current); setPendingScan(null); }}
                          className="flex-1 py-2 rounded-xl text-sm font-semibold text-gray-300 border border-white border-opacity-20 bg-white bg-opacity-10">✕ Rescan</button>
                        <button onClick={() => { clearTimeout(confirmTimer.current); setPendingScan(null); processScan(pendingScan); }}
                          className="flex-1 py-2 rounded-xl text-sm font-semibold text-white bg-emerald-600">✓ Use this</button>
                      </div>
                    </div>
                  </div>
                );
              })()}
            </div>
          : <div className="h-full flex items-center"><ErrorBanner msg={cameraErr} /></div>
        }
      </div>

      {/* Status line */}
      <div className={`mx-5 my-2 flex items-center gap-2 rounded-xl px-3 py-2 text-xs shrink-0 ${
        current.serial
          ? 'bg-emerald-500 bg-opacity-10 border border-emerald-500 border-opacity-30 text-emerald-300'
          : 'bg-white bg-opacity-5 text-gray-500'
      }`}>
        <span>{current.serial ? '→' : '↑'}</span>
        <span className="flex-1">{hint}</span>
        {current.serial && !current.mac && (
          <span className="font-mono text-emerald-400 font-bold">{current.serial}</span>
        )}
      </div>

      {/* Manual entry — collapsible */}
      <div className="px-5 shrink-0">
        <button
          onClick={() => setManualOpen(o => !o)}
          className="w-full flex items-center justify-between px-3 py-2 rounded-xl text-xs transition-colors"
          style={{
            background: manualOpen ? 'rgba(16,185,129,0.08)' : 'rgba(255,255,255,0.05)',
            border: `1px solid ${manualOpen ? 'rgba(16,185,129,0.25)' : 'rgba(255,255,255,0.08)'}`,
            color: manualOpen ? '#10b981' : '#9ca3af',
          }}
        >
          <span>⌨️ Enter serial manually</span>
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"
            style={{ transform: manualOpen ? 'rotate(180deg)' : 'rotate(0deg)', transition: 'transform 0.2s' }}>
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </button>
        {manualOpen && (
          <div className="space-y-2 pb-2">
            <input
              value={manualSerial}
              onChange={e => setManualSerial(e.target.value.toUpperCase())}
              placeholder="Serial number  e.g. CP0001108"
              className="w-full bg-white bg-opacity-5 border border-white border-opacity-10 rounded-xl px-3 py-2.5 text-white placeholder-gray-700 focus:outline-none focus:border-emerald-500 text-sm font-mono transition-colors"
            />
            <input
              value={manualMac}
              onChange={e => setManualMac(e.target.value.toUpperCase())}
              placeholder="MAC address (optional)  e.g. 00:0B:86:B8:64:18"
              className="w-full bg-white bg-opacity-5 border border-white border-opacity-10 rounded-xl px-3 py-2.5 text-white placeholder-gray-700 focus:outline-none focus:border-emerald-500 text-sm font-mono transition-colors"
            />
            <button
              onClick={() => {
                const s = manualSerial.trim();
                if (s.length < 4) return;
                addItemToQueue(s, manualMac.trim() || null);
                setManualSerial('');
                setManualMac('');
              }}
              disabled={manualSerial.trim().length < 4}
              className="w-full py-2.5 rounded-xl text-sm font-semibold text-white bg-emerald-600 active:bg-emerald-700 disabled:opacity-40 disabled:cursor-not-allowed transition-all"
            >
              Add to queue →
            </button>
          </div>
        )}
      </div>

      {/* Queue — scrollable, fills remaining space */}
      <div className="flex-1 overflow-y-auto px-5 min-h-0">
        {queue.length === 0
          ? <div className="flex flex-col items-center py-4 text-center">
              <p className="text-gray-600 text-sm">No devices scanned yet</p>
              <p className="text-gray-700 text-xs mt-1">Devices appear here as you scan them</p>
            </div>
          : <>
              <p className="text-gray-600 text-xs uppercase tracking-wider font-semibold pt-1 pb-2">
                Scanned — {queue.length} device{queue.length !== 1 ? 's' : ''}
              </p>
              <div className="space-y-2 pb-2">
                {queue.map(item => (
                  <div key={item._id} className="flex items-center gap-3 bg-white bg-opacity-5 border border-white border-opacity-10 rounded-2xl px-4 py-3">
                    <span className="text-base shrink-0 leading-none">
                      {item.deviceType === 'AP' ? '📡' : item.deviceType === 'SWITCH' ? '🔀' : item.deviceType === 'GATEWAY' ? '🌐' : '📦'}
                    </span>
                    <div className="flex-1 min-w-0">
                      <p className="text-white text-sm font-mono font-semibold">{item.serial}</p>
                      <p className="text-gray-500 text-xs mt-0.5 truncate">
                        {item.lookupStatus === 'loading' ? 'Looking up…'
                          : [item.deviceModel, item.partNumber].filter(Boolean).join(' · ') || 'New device'}
                      </p>
                    </div>
                    <div className="flex items-center gap-2 shrink-0">
                      {item.lookupStatus === 'loading'
                        ? <span className="text-xs px-2 py-0.5 rounded-full bg-white bg-opacity-10 text-gray-500">…</span>
                        : item.isExisting
                        ? <span className="text-xs px-2 py-0.5 rounded-full bg-blue-500 bg-opacity-20 text-blue-400 font-semibold">EXISTS</span>
                        : <span className="text-xs px-2 py-0.5 rounded-full bg-emerald-500 bg-opacity-20 text-emerald-400 font-semibold">NEW</span>
                      }
                      <button onClick={() => removeItem(item._id)}
                        className="w-6 h-6 flex items-center justify-center rounded-lg text-gray-600 active:text-red-400 text-sm">✕</button>
                    </div>
                  </div>
                ))}
              </div>
            </>
        }
      </div>

      {/* Done button */}
      <div className="px-5 py-3 shrink-0" style={{ borderTop: '1px solid rgba(255,255,255,0.07)' }}>
        {settings.demoMode && (
          <div className="mb-2 grid grid-cols-3 gap-2">
            <button onClick={() => {
                const n = ++demoIdxRef.current;
                const hex = String(n).padStart(2, '0');
                addDemoDevice(`SN:TW34KNP${String(n).padStart(4,'0')};MAC:AA:BB:CC:11:22:${hex}`);
              }}
              className="py-2 rounded-xl text-xs font-semibold text-gray-300 bg-white bg-opacity-10">📡 AP</button>
            <button onClick={() => {
                const n = ++demoIdxRef.current;
                const hex = String(n).padStart(2, '0');
                addDemoDevice(`SN:SG90KN${String(n).padStart(4,'0')};MAC:BB:CC:DD:44:55:${hex}`);
              }}
              className="py-2 rounded-xl text-xs font-semibold text-gray-300 bg-white bg-opacity-10">🔀 Switch</button>
            <button onClick={() => {

              }}
              className="py-2 rounded-xl text-xs font-semibold text-gray-300 bg-indigo-500 bg-opacity-10 border border-indigo-500 border-opacity-20">🔄 Existing</button>
          </div>
        )}
        <Btn onClick={() => onDone(queue)} disabled={queue.length === 0}>
          Done ({queue.length} device{queue.length !== 1 ? 's' : ''}) →

};

// ── SCREEN: BATCH ADDING ──────────────────────────────────────────────────────
// Adds each queued device to GL sequentially, shows progress per device.
const BatchAddingScreen = ({ queue, shared, settings, api, onSuccess, onBack }) => {
  const [results, setResults] = useState([]);
  const [currentIdx, setCurrentIdx] = useState(0);
  const [done, setDone] = useState(false);

  useEffect(() => {
    const run = async () => {
      const res = [];
      for (let i = 0; i < queue.length; i++) {
        setCurrentIdx(i);
        const item = queue[i];
        try {
          const device = await api.glAddDevice({
            serial: item.serial, mac: item.mac,
            tags: shared.tags,
            locationId: shared.location?.id,
            ...settings,
          });
          const glType = (device.deviceType || '').toUpperCase();
          const mapped = GL_DEVICE_TYPE_MAP[glType] || item.deviceType || null;
          res.push({
            ...item,
            status: 'success',
            glDeviceId: device.id,
            deviceType: mapped,
            deviceModel: device.model || device.deviceModel || item.deviceModel || null,
            partNumber: device.partNumber || item.partNumber || null,
            foundExisting: device.foundExisting || item.isExisting,
            // Prefer values from the scan-time GL lookup; fall back to GL add response
            currentSubscriptionKey: item.currentSubscriptionKey || device._subKey || null,
            currentFunctionId: item.currentFunctionId || null,
          });
        } catch (err) {
          res.push({ ...item, status: 'error', error: err.message });
        }
        setResults([...res]);
      }
      setDone(true);
      onSuccess([...res]);
    };
    run();
  }, []);

  const total = queue.length;
  const doneCount = results.length;

  return (
    <div className="p-5 step-enter">
      <div className="pt-2 mb-5">
        <h2 className="text-white font-bold text-xl">Adding to GreenLake</h2>
        <p className="text-gray-400 text-sm">{total} device{total !== 1 ? 's' : ''}</p>
      </div>

      <div className="w-full h-1.5 bg-white bg-opacity-10 rounded-full mb-5">
        <div className="h-full bg-emerald-500 rounded-full transition-all duration-500"
          style={{ width: `${total > 0 ? (doneCount / total) * 100 : 0}%` }} />
      </div>

      <div className="space-y-2">
        {queue.map((item, idx) => {
          const result = results[idx];
          const isCurrent = !result && idx === currentIdx;
          const status = result ? (result.status === 'success' ? (result.foundExisting ? 'found' : 'added') : 'error') : (isCurrent ? 'loading' : 'pending');
          return (
            <div key={item._id} className="flex items-center gap-3 bg-white bg-opacity-5 rounded-xl px-4 py-3">
              <div className="w-5 flex justify-center shrink-0">
                {status === 'pending'  && <span className="text-gray-700 text-lg">·</span>}
                {status === 'loading'  && <div className="w-4 h-4 rounded-full animate-spin" style={{ border: '2px solid rgba(16,185,129,0.2)', borderTopColor: '#10b981' }} />}
                {status === 'added'    && <span className="text-emerald-400">✓</span>}
                {status === 'found'    && <span className="text-blue-400">~</span>}
                {status === 'error'    && <span className="text-red-400">✕</span>}
              </div>
              <div className="flex-1 min-w-0">
                <p className="text-white text-sm font-mono">{item.serial}</p>
                {status === 'error'  && <p className="text-red-400 text-xs truncate">{result?.error}</p>}
                {status === 'found'  && <p className="text-blue-300 text-xs">Already in GreenLake — updating</p>}
                {status === 'added'  && <p className="text-emerald-300 text-xs">Registered successfully</p>}
              </div>
            </div>
          );
        })}
      </div>

      {done && results.filter(r => r.status === 'error').length === results.length && (
        <div className="mt-5">
          <ErrorBanner msg="All devices failed. Check credentials and try again." />
          <div className="mt-3"><Btn variant="secondary" onClick={onBack}>← Go Back</Btn></div>
        </div>
      )}
    </div>
  );
};

// ── SCREEN: BATCH HOSTNAME ────────────────────────────────────────────────────
// Optional — user enters a pattern; skip is the default / primary action.
const BatchHostnameScreen = ({ queue, onNext, onSkip }) => {
  const [pattern, setPattern] = useState('');
  const [names, setNames]     = useState({});   // serial → hostname (pre-filled by pattern, editable)
  const successItems = queue.filter(q => q.status === 'success');

  // Validate pattern: no spaces, only hostname-safe chars + our tokens
  const stripped = pattern.replace(/\{[^}]*\}/g, 'X');
  const patternInvalid = stripped.length > 0 && !/^[a-zA-Z0-9\-X]+$/.test(stripped);

  // When pattern changes and is valid, pre-fill the per-device name inputs
  useEffect(() => {
    if (!pattern.trim() || patternInvalid) return;
    setNames(prev => {
      const next = { ...prev };
      successItems.forEach((item, i) => {
        next[item.serial] = generateHostname(pattern.trim(), item, i + 1);
      });
      return next;
    });
  }, [pattern]);

  const setName = (serial, val) =>
    setNames(prev => ({ ...prev, [serial]: val.replace(/\s/g, '-') }));

  const anySet = successItems.some(item => (names[item.serial] || '').trim());

  const handleApply = () => {
    const hostnames = {};
    for (const item of successItems) {
      const n = (names[item.serial] || '').trim();
      if (n) hostnames[item.serial] = n;
    }
    onNext({ hostnames, hostnamePattern: pattern.trim() || null });
  };

  return (
    <div className="p-5 pb-8 step-enter">
      <div className="pt-2 mb-4">
        <h2 className="text-white font-bold text-xl">Hostnames</h2>
        <p className="text-gray-400 text-sm">Optional — name devices via pattern or individually</p>
      </div>

      {/* API limitation warning */}
      <div className="flex items-start gap-3 bg-amber-500 bg-opacity-10 border border-amber-500 border-opacity-30 rounded-2xl px-4 py-3 mb-5">
        <span className="text-amber-400 text-lg shrink-0">⚠️</span>
        <p className="text-amber-300 text-xs leading-relaxed">Hostname assignment only works for devices already provisioned in New Central with a site assigned. Devices just added will be skipped — set those manually in Aruba Central.</p>
      </div>

      {/* Skip is the easy primary action */}
      <Btn onClick={onSkip} className="mb-5">Skip →</Btn>

      {/* ── PATTERN SECTION ── */}
      <div className="flex items-center gap-3 mb-4">
        <div className="flex-1 h-px bg-white bg-opacity-10" />
        <span className="text-gray-600 text-xs">fill by pattern</span>
        <div className="flex-1 h-px bg-white bg-opacity-10" />
      </div>

      <div className="space-y-2 mb-3">
        <input
          value={pattern}
          onChange={e => setPattern(e.target.value)}
          placeholder="e.g. AP-Floor-{N:02}"
          className={`w-full bg-white bg-opacity-5 border rounded-xl px-4 py-3 text-white placeholder-gray-700 focus:outline-none text-sm font-mono transition-colors ${patternInvalid ? 'border-red-500 border-opacity-60 focus:border-red-500' : 'border-white border-opacity-10 focus:border-emerald-500'}`}
        />
        {patternInvalid && <p className="text-red-400 text-xs">Only letters, numbers, dashes, and pattern tokens allowed</p>}
      </div>
      <div className="flex flex-wrap gap-1.5 mb-5">
        {['{MODEL}','{PART}','{SERIAL}','{N}','{N:02}','{N:03}'].map(t => (
          <button key={t} onClick={() => setPattern(p => p + (p.length > 0 && !p.endsWith('-') ? '-' : '') + t)}
            className="px-2 py-1 text-xs font-mono bg-white bg-opacity-5 border border-white border-opacity-10 rounded-lg text-gray-400 active:bg-opacity-10">
            {t}
          </button>
        ))}
      </div>

      {/* ── PER-DEVICE INPUTS ── */}
      <div className="flex items-center gap-3 mb-4">
        <div className="flex-1 h-px bg-white bg-opacity-10" />
        <span className="text-gray-600 text-xs">or set individually</span>
        <div className="flex-1 h-px bg-white bg-opacity-10" />
      </div>

      <div className="space-y-2 mb-5">
        {successItems.map((item, i) => {
          const icon = item.deviceType === 'AP' ? '📡' : item.deviceType === 'SWITCH' ? '🔀' : item.deviceType === 'GATEWAY' ? '🌐' : '📦';
          const val = names[item.serial] || '';
          const nameInvalid = val.length > 0 && !/^[a-zA-Z0-9\-]+$/.test(val);
          return (
            <div key={item.serial} className="flex items-center gap-2">
              <span className="text-base shrink-0">{icon}</span>
              <span className="text-gray-500 text-xs font-mono w-24 shrink-0 truncate">{item.serial}</span>
              <input
                value={val}
                onChange={e => setName(item.serial, e.target.value)}
                placeholder={`device-${String(i+1).padStart(2,'0')}`}
                className={`flex-1 bg-white bg-opacity-5 border rounded-xl px-3 py-2 text-white placeholder-gray-700 focus:outline-none text-xs font-mono transition-colors ${nameInvalid ? 'border-red-500 border-opacity-60' : val ? 'border-emerald-500 border-opacity-40' : 'border-white border-opacity-10 focus:border-emerald-500'}`}
              />
            </div>
          );
        })}
      </div>

      <Btn onClick={handleApply} disabled={!anySet}>
        Apply Hostnames →
      </Btn>
    </div>
  );
};

// ── SCREEN: BATCH PROVISION ───────────────────────────────────────────────────
// Provisions all devices sequentially — tags/contact, subscription, app, site, function.
const BatchProvisionScreen = ({ queue, groups, shared, settings, api, onDone }) => {
  const [results, setResults] = useState({});   // serial → { tags, sub, app, site, fn }
  const [currentSerial, setCurrentSerial] = useState(null);
  const [done, setDone] = useState(false);

  useEffect(() => {
    const run = async () => {
      const successItems = queue.filter(q => q.status === 'success');
      // Build serial → group lookup
      const groupBySerial = {};
      for (const g of groups) {
        for (const serial of g.deviceSerials) groupBySerial[serial] = g;
      }

      const allResults = {};
      for (const item of successItems) {
        setCurrentSerial(item.serial);
        const steps = { tags: 'pending', sub: 'pending', app: 'pending', site: 'pending', fn: 'pending', hostname: 'pending' };
        const set = (k, v) => { steps[k] = v; setResults(prev => ({ ...prev, [item.serial]: { ...steps } })); };
        const group = groupBySerial[item.serial];

        // Tags + contact
        try {
          const tagPatch = { ...(shared.tags || {}) };
          Object.keys(item.currentTags || {}).forEach(k => { if (tagPatch[k] === undefined) tagPatch[k] = null; });
          const hasTags    = Object.keys(tagPatch).length > 0;
          const hasContact = !!shared.contact?.id;
          if (hasTags || hasContact) {
            set('tags', 'loading');
            await api.glPatchAttributes({ deviceId: item.glDeviceId, tags: hasTags ? tagPatch : undefined, contact: shared.contact, ...settings });
          }
          set('tags', 'success');
        } catch(e) { set('tags', 'error'); }

        // Subscription
        const sub = group?.subscription;
        if (sub?.id) {
          try { set('sub', 'loading'); await api.glAssignSubscription({ deviceId: item.glDeviceId, subscriptionId: sub.id, ...settings }); set('sub', 'success'); }
          catch(e) { set('sub', 'error'); }
        } else { set('sub', 'skipped'); }

        // Application
        if (shared.application?.id) {
          try { set('app', 'loading'); await api.glAssignApplication({ deviceId: item.glDeviceId, applicationId: shared.application.id, region: shared.applicationRegion || shared.application.region, ...settings }); set('app', 'success'); }
          catch(e) { set('app', 'error'); }
        } else { set('app', 'skipped'); }

        // Site
        if (shared.site?.id) {
          try { set('site', 'loading'); await api.centralAssignSite({ serial: item.serial, siteId: shared.site.id, ...settings }); set('site', 'success'); }
          catch(e) { set('site', e.softFail ? 'skipped' : 'error'); }
        } else { set('site', 'skipped'); }

        // Function
        const fn = group?.deviceFunction;
        if (fn?.id) {
          try { set('fn', 'loading'); await api.centralAssignFunction({ deviceId: item.glDeviceId, serial: item.serial, persona: fn.id, ...settings }); set('fn', 'success'); }
          catch(e) { set('fn', e.softFail ? 'skipped' : 'error'); }
        } else { set('fn', 'skipped'); }

        // Hostname (soft-fail if device not yet in Central)
        const hostname = shared.hostnames?.[item.serial];
        if (hostname) {
          try {
            set('hostname', 'loading');
            const sysInfo = await api.centralGetSystemInfo({ serial: item.serial, deviceType: item.deviceType, ...settings });
            const scopeId = sysInfo?._scopeId || null;
            if (!scopeId) throw Object.assign(new Error('Device not in Central yet'), { softFail: true });
            const hasExisting = !!(sysInfo?.deviceName && !/^([0-9a-f]{2}:){5}[0-9a-f]{2}$/i.test(sysInfo.deviceName));
            const persona = fn?.id || item.currentFunctionId || 'CAMPUS_AP';
            await api.centralSetHostname({ serial: item.serial, hostname, hostnameExists: hasExisting, scopeId, persona, deviceType: item.deviceType, ...settings });
            set('hostname', 'success');
          } catch(e) { set('hostname', e.softFail ? 'skipped' : 'error'); }
        } else { set('hostname', 'skipped'); }

        allResults[item.serial] = { ...steps };
        setResults({ ...allResults });
      }
      setCurrentSerial(null);
      setDone(true);
    };
    run();
  }, []);

  const successItems = queue.filter(q => q.status === 'success');
  const doneCount    = Object.keys(results).length;
  const stepLabels   = [['tags','Tags'],['sub','Sub'],['app','App'],['site','Site'],['fn','Fn'],['hostname','Name']];
  const stepColor    = v => v === 'success' ? 'bg-emerald-500 bg-opacity-20 text-emerald-400' : v === 'skipped' ? 'bg-white bg-opacity-10 text-gray-600' : v === 'error' ? 'bg-red-500 bg-opacity-20 text-red-400' : v === 'loading' ? 'bg-yellow-500 bg-opacity-20 text-yellow-400' : 'bg-white bg-opacity-5 text-gray-700';

  return (
    <div className="p-5 step-enter">
      <div className="pt-2 mb-5">
        <h2 className="text-white font-bold text-xl">Provisioning</h2>
        <p className="text-gray-400 text-sm">{done ? 'Complete' : `${doneCount} of ${successItems.length} devices`}</p>
      </div>

      <div className="w-full h-1.5 bg-white bg-opacity-10 rounded-full mb-5">
        <div className="h-full bg-emerald-500 rounded-full transition-all duration-500"
          style={{ width: `${successItems.length ? (doneCount / successItems.length) * 100 : 0}%` }} />
      </div>

      <div className="space-y-2">
        {successItems.map(item => {
          const r = results[item.serial];
          const isCurrent = item.serial === currentSerial;
          const allGood = r && Object.values(r).every(v => v === 'success' || v === 'skipped');
          const hasErr  = r && Object.values(r).some(v => v === 'error');
          return (
            <div key={item.serial} className={`bg-white bg-opacity-5 border rounded-xl px-4 py-3 ${isCurrent ? 'border-white border-opacity-20' : 'border-white border-opacity-10'}`}>
              <div className="flex items-center gap-3 mb-2">
                <span className="text-sm">{item.deviceType === 'AP' ? '📡' : item.deviceType === 'SWITCH' ? '🔀' : '📦'}</span>
                <span className="text-white text-sm font-mono flex-1">{item.serial}</span>
                {isCurrent && <div className="w-3.5 h-3.5 rounded-full animate-spin" style={{ border: '2px solid rgba(16,185,129,0.2)', borderTopColor: '#10b981' }} />}
                {!isCurrent && allGood && <span className="text-emerald-400 text-sm">✓</span>}
                {!isCurrent && hasErr  && <span className="text-red-400 text-sm">!</span>}
              </div>
              {r && (
                <div className="flex gap-1.5 flex-wrap">
                  {stepLabels.map(([key, label]) => (
                    <span key={key} className={`text-xs px-2 py-0.5 rounded-full ${stepColor(r[key])}`}>{label}</span>
                  ))}
                </div>
              )}
            </div>
          );
        })}
      </div>

      {done && (
        <div className="mt-6">
          <Btn onClick={onDone}>Done ✓</Btn>
        </div>
      )}
    </div>
  );
};
